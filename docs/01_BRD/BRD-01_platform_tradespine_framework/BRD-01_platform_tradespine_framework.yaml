      - id: "BRD.01.10.8d76"
        category: Platform
        description: "MetaTrader 5 and MQL5 are mandatory for this platform cycle."
        impact: "MQL4 compatibility and non-MT5 runtime targets are rejected."
      - id: "BRD.01.10.32c6"
        category: Build
        description: "v1 compile workflow uses MetaEditor."
        impact: "Headless CI compile is deferred unless added by a later change."
      - id: "BRD.01.10.a8a5"
        category: Broker
        description: "Broker symbol metadata, account mode, and trade retcodes remain authoritative operational inputs."
        impact: "The framework must fail loudly on unusable broker data."
      - id: "BRD.01.10.6ca8"
        category: Analytics
        description: "Advanced analytics run outside the MQL5 tree."
        impact: "The framework records evidence; Python tooling performs deeper analysis."
  assumptions:
    items:
