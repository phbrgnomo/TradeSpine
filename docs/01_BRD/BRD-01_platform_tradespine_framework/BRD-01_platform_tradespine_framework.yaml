## Functional Requirements
functional_requirements:
  priority_definitions:
    P1: "Must Have - blocks v1.0 if missing"
    P2: "Should Have - useful for v1.0 but deferrable with explicit rationale"
    Future: "Next BRD cycle or later roadmap item"
  requirements:
    - id: "BRD.01.07.88a6"
      title: "Single-file strategy authoring"
      capability: "System must enable a trader to create a new MT5 strategy as one strategy file that uses shared framework services."
      priority: P1
      complexity:
        rating: "3/5"
        rationale: "Trader -> strategy -> framework; no regulatory workflow; multiple authoring constraints."
      business_needs:
        - "Keep strategy files focused on signal logic and strategy-level behavior selection."
        - "Provide a template and references that expose the expected authoring pattern."
      business_rules:
        - "A v1 strategy attaches to one chart symbol."
        - "Strategy logic must not require direct broker execution infrastructure."
      acceptance_criteria:
        items:
          - id: "BRD.01.07.71d6"
            criterion: "Reference strategy packaging"
            target: "Each v1 reference strategy is one `.mq5` strategy file plus shared framework includes."
    - id: "BRD.01.07.a94e"
      title: "Guarded trade flow"
      capability: "System must ensure every framework-mediated entry passes through one guarded trade path before broker submission."
      priority: P1
      complexity:
        rating: "5/5"
        rationale: "Strategy -> framework -> broker; real-money trading risk; many safety constraints."
      business_needs:
        - "Prevent catastrophic order volume or direction errors from framework helper usage."
        - "Reject unsafe trades before they reach the broker."
      business_rules:
        - "Raw broker submission is prohibited by repository policy for strategy files."
        - "Safety checks must apply to framework helpers, not depend on each strategy author repeating them."
      acceptance_criteria:
        items:
          - id: "BRD.01.07.de65"
            criterion: "Guard coverage"
            target: "100% of framework helper entry paths route through the guarded execution path."
    - id: "BRD.01.07.b44d"
      title: "Account-mode independent strategy ownership"
      capability: "System must support strategy-scoped ownership on netting, exchange-netting, and hedging accounts."
      priority: P1
      complexity:
        rating: "5/5"
        rationale: "Strategy -> framework -> broker account mode; high trading risk; ownership and recovery constraints."
      business_needs:
        - "Allow multiple TradeSpine strategies on the same symbol with distinct strategy identity."
        - "Keep strategy code mode-agnostic."
      business_rules:
        - "Exclusive same-symbol locking on netting accounts is not acceptable."
        - "Manual activity outside the strategy is outside strategy ownership."
      acceptance_criteria:
        items:
          - id: "BRD.01.07.49b8"
            criterion: "Same-symbol strategy independence"
            target: "Two same-symbol strategy instances can maintain independent ownership evidence in supported account modes."
    - id: "BRD.01.07.69ef"
      title: "B3 futures MVP scope"
      capability: "System must support B3 futures strategy development for WIN, WDO, IND, and DOL in v1."
      priority: P1
      complexity:
        rating: "4/5"
        rationale: "Trader -> broker symbol metadata; exchange trading constraints; futures sizing and session rules."
      business_needs:
        - "Use broker-provided symbol and session information for trading decisions."
        - "Support futures risk sizing for v1 reference strategies."
      business_rules:
        - "B3 equities remain deferred to a later BRD cycle."
        - "Fallback constants for symbol data are rejected."
      acceptance_criteria:
        items:
          - id: "BRD.01.07.9b1f"
            criterion: "Futures validation scope"
            target: "v1.0 sign-off includes B3 futures symbols in the supported validation set."
    - id: "BRD.01.07.8e15"
      title: "Trade audit evidence"
      capability: "System must provide paired trade intent and execution evidence for post-trade review."
      priority: P1
      complexity:
        rating: "4/5"
        rationale: "Strategy -> framework -> broker -> analytics; financial audit evidence; schema and retention constraints."
      business_needs:
        - "Record intended trade risk and final broker outcome."
        - "Keep analytics outside the MQL5 tree while preserving exportable evidence."
      business_rules:
        - "Optimization mode may suppress audit writes unless explicitly enabled."
        - "Python analytics consume exported evidence; the framework reports data only."
      acceptance_criteria:
        items:
          - id: "BRD.01.07.75a9"
            criterion: "Evidence pairing"
            target: "Each accepted entry attempt has intent and execution evidence rows."
    - id: "BRD.01.07.717b"
      title: "Framework testability"
      capability: "System must support non-broker tests for pure logic and coordinator behavior."
      priority: P1
      complexity:
        rating: "4/5"
        rationale: "Framework -> test harness; no external partner; multiple safety-critical behaviors."
      business_needs:
        - "Validate safety and state behavior without live broker dependency."
        - "Support phased confidence before real-money operation."
      business_rules:
        - "Business safety gates require test evidence before v1.0 sign-off."
      acceptance_criteria:
        items:
          - id: "BRD.01.07.7ef2"
            criterion: "Test evidence"
            target: "Tier-1 and Tier-2 test evidence exists for v1.0 launch gates."
    - id: "BRD.01.07.bf02"
      title: "Low-overhead operation"
      capability: "System must avoid unnecessary runtime work during optimization and idle ticks."
      priority: P2
      complexity:
        rating: "3/5"
        rationale: "Framework -> MT5 tester; no regulatory workflow; performance and I/O constraints."
      business_needs:
        - "Keep strategy testing practical during optimization passes."
        - "Avoid runtime I/O that does not support trading decisions."
      business_rules:
        - "Optimization context controls heavy logging, drawing, and persistence paths."
      acceptance_criteria:
        items:
          - id: "BRD.01.07.1505"
            criterion: "Optimization overhead"
            target: "Median framework strategy tester overhead is <=10% versus matched baseline under the benchmark protocol."

