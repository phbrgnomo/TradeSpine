## Introduction
introduction:
  business_context: >
    The current strategy-development process creates one Expert Advisor per
    strategy and repeats broker/session handling, position accounting, risk
    controls, logging, and recovery logic in each file. The TradeSpine platform
    consolidates those shared concerns into an audited framework so new B3
    futures strategies can focus on strategy logic.
  purpose: >
    This BRD defines the business requirements for the first TradeSpine MVP
    cycle: a reusable MT5 framework foundation that supports safe strategy
    authoring, same-symbol multi-strategy operation, reproducible dependencies,
    and evidence suitable for post-trade analysis.
  document_scope:
    in_scope:
      - "Business objectives for the platform foundation."
      - "MVP capabilities needed before downstream strategy BRDs depend on TradeSpine."
      - "Quality expectations and launch gates for v1.0."
      - "Architecture decision topics for downstream PRD, ADR, and SPEC artifacts."
    out_of_scope:
      - "Detailed MQL5 class contracts and method signatures."
      - "Per-module implementation plans."
      - "Custom optimization criteria and Python analytics implementation."
      - "B3 equities, pyramiding, multi-symbol operation, UI panels, and WebRequest integrations."

## Business Objectives
business_objectives:
  hypothesis:
    statement: "A shared MT5 strategy framework can reduce duplicated EA infrastructure while enforcing strategy-level safety and auditability for B3 futures trading."
    validation_questions:
      - "Can a reference strategy be authored as one strategy file with shared infrastructure outside the strategy file?"
      - "Can framework-mediated orders pass through safety checks that prevent catastrophic order submission?"
      - "Can netting and hedging accounts support multiple same-symbol strategy instances without strategy-code changes?"
  problem_statement:
    problem: "Each custom EA repeats critical infrastructure, increasing delivery time and real-money defect exposure."
    impact: "The source brief estimates the reference Turtle EA at 4,081 lines with roughly 70% reusable infrastructure."
    mvp_solution: "Create a shared TradeSpine platform foundation and reference strategies that prove the common infrastructure layer."
  goals:
    - id: "BRD.01.04.22e9"
      statement: "Reduce per-strategy infrastructure duplication for new B3 futures strategies."
      baseline: "Reference strategy contains roughly 70% reusable infrastructure."
      target: "New reference strategy uses a single strategy file with shared framework services by v1.0."
    - id: "BRD.01.04.7b04"
      statement: "Prevent catastrophic framework-mediated order submission."
      baseline: "Safety checks are repeated per EA."
      target: "All framework helper order flow passes through a guarded path before broker submission."
    - id: "BRD.01.04.4fb6"
      statement: "Preserve same-symbol multi-strategy operation across supported account modes."
      baseline: "Netting isolation is a known design risk."
      target: "Both netting and hedging modes demonstrate independent strategy ownership for same-symbol strategies."
    - id: "BRD.01.04.3030"
      statement: "Make framework builds reproducible across terminal updates."
      baseline: "MetaTrader standard-library behavior may change with terminal updates."
      target: "Dependencies used by the framework are vendored and version-recorded for v1.0."
    - id: "BRD.01.04.79f3"
      statement: "Enable strategy authoring without reading framework internals."
      baseline: "Current strategy authoring requires infrastructure knowledge."
      target: "v1.0 ships a template, two reference strategies, and authoring documentation."
  success_metrics:
    - id: "BRD.01.04.d58c"
      objective: "Strategy authoring compression"
      metric: "Reference strategy shape"
      target: "One `.mq5` strategy file plus shared framework includes"
      period: "v1.0 sign-off"
    - id: "BRD.01.04.9f63"
      objective: "Safety gate coverage"
      metric: "Framework-mediated order paths"
      target: "100% routed through guarded execution"
      period: "v1.0 sign-off"
    - id: "BRD.01.04.7937"
      objective: "Account-mode parity"
      metric: "Supported account modes"
      target: "Netting, exchange-netting, and hedging behavior validated"
      period: "v1.0 sign-off"
  expected_benefits:
    quantifiable:
      - "Reduce repeated infrastructure from the reference baseline toward a single shared layer."
      - "Ship two reference strategies for validation and examples."
      - "Complete phased build gates from v0.1 through v1.0."
    qualitative:
      - "Centralized review surface for safety-critical trading behavior."
      - "Clear separation between strategy logic and execution infrastructure."
      - "Traceable audit evidence for Python-side analysis."
  cost_benefit:
    development_costs:
      team: "One owner-operator/developer through phased v0.1-v1.0 delivery."
      infrastructure: "Existing local MT5 terminal and repository."
      third_party: "No required external package dependency for v1."
    total_mvp_investment: "Owner time; cash cost not estimated in source brief."
    roi_hypothesis: "Investment is justified if repeated strategy infrastructure is replaced by audited shared services without reducing trading safety."

## Project Scope
project_scope:
  scope_statement: >
    The MVP establishes TradeSpine as the platform BRD for single-symbol MT5
    strategy development on B3 futures. It delivers the framework foundation,
    reference strategy authoring model, strategy-scoped safety controls, audit
    evidence, and account-mode abstraction needed before downstream strategy
    features depend on the framework.
  core_features:
    p1_must_have:
      - "Single-file strategy authoring model."
      - "Guarded framework-mediated trade execution."
      - "Strategy-scoped netting and hedging ownership."
      - "B3 futures sizing and session support."
      - "Trade intent and execution audit evidence."
      - "Vendored standard-library dependency foundation."
      - "Reference strategy template and two working reference strategies."
    p2_should_have:
      - "Low-I/O optimization and idle-path behavior."
      - "Operator-facing documentation for strategy authors."
      - "Extensible placeholders for deferred equity and advanced analytics work."
  out_of_scope:
    items:
      - "B3 equities implementation."
      - "Pyramiding and partial-close management."
      - "Multi-symbol and portfolio operation."
      - "Custom optimization criteria and DSR analytics."
      - "External API/WebRequest integrations."
      - "User interface panels."
    rationale: "The MVP proves the shared platform foundation before expanding strategy breadth."
  workflow:
    diagram:
      type: sequenceDiagram
      content: |
        sequenceDiagram
          participant Trader
          participant Strategy
          participant TradeSpine
          participant Broker
          participant Analytics
          Trader->>Strategy: Configure strategy inputs
          Strategy->>TradeSpine: Request framework-mediated trade action
          TradeSpine->>Broker: Submit only after business safety gates pass
          Broker-->>TradeSpine: Return trade outcome
          TradeSpine->>Analytics: Record intent and execution evidence
          Analytics-->>Trader: Support post-trade review
    happy_path:
      - "Trader selects a B3 futures strategy and risk settings."
      - "Strategy emits a trading intent through framework helpers."
      - "TradeSpine applies safety, session, account-mode, and audit rules."
      - "Broker accepts or rejects the trade request."
      - "TradeSpine records paired evidence for review."

