## Glossary
glossary:
  terms:
    - term: B3
      definition: "Brazilian exchange market targeted by the v1 futures scope."
    - term: Expert Advisor
      definition: "MetaTrader automated trading program."
    - term: Framework-mediated order
      definition: "Order request submitted through TradeSpine helper and guard paths."
    - term: Netting
      definition: "Account mode where the broker maintains one aggregate position per symbol."
    - term: Hedging
      definition: "Account mode where separate broker position tickets can coexist."
    - term: Virtual ownership
      definition: "TradeSpine strategy-scoped accounting used to separate same-symbol strategy exposure."
    - term: Trade audit evidence
      definition: "Paired intent and execution records used for post-trade review."
    - term: Vendored standard library
      definition: "Frozen in-repository copy of selected MetaQuotes standard-library files."

## Appendix
appendix:
  lifecycle:
    diagram:
      type: flowchart
      content: |
        flowchart LR
          BRD01[BRD-01 Platform Foundation] --> PRD01[PRD-01 Product Requirements]
          PRD01 --> BUILD[v0.1-v1.0 phased build]
          BUILD --> PROD[TradeSpine v1.0]
          PROD --> FEEDBACK[Strategy authoring and safety feedback]
          FEEDBACK --> BRD02[Next BRD cycle]
    principles:
      - "BRD-01 defines the platform foundation."
      - "Downstream strategy or feature expansions should use new BRDs after v1.0 feedback."
      - "Implementation detail belongs in PRD, ADR, SPEC, TDD, and IPLAN artifacts."
      - "Safety and traceability gates block progression to code."
    when_to_start_new_cycle:
      - "v1.0 platform scope is implemented and validated."
      - "Reference strategies expose a repeated unmet capability."
      - "A deferred scope item becomes business-critical."
      - "A live-use safety finding requires product-scope change."
  next_cycle_roadmap:
    - candidate_brd: "B3 equities strategy support"
      trigger: "First equity strategy is prioritized."
    - candidate_brd: "Advanced optimization analytics"
      trigger: "Python-side optimization evidence becomes part of strategy selection."
