## Executive Summary
executive_summary:
  overview: >
    TradeSpine defines the platform foundation for reusable, safety-governed
    MetaTrader 5 strategy development focused on B3 futures. The MVP validates
    whether shared execution, risk, state, and audit capabilities can replace
    repeated per-strategy infrastructure while preserving strategy-author
    control over entry logic.
  target_users:
    primary:
      - segment: "Owner-operator trader building MT5 strategies for B3 futures"
        need: "Create strategies without repeatedly rebuilding execution, risk, session, and audit infrastructure."
        size: "One primary operator for v1"
    secondary:
      - segment: "Future MQL5 strategy developer"
        need: "Use a documented framework without deep expertise in account-mode, broker, or async execution mechanics."

