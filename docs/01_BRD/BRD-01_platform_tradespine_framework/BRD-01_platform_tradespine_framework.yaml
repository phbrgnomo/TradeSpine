        assumption: "The broker exposes sufficient symbol, session, and account metadata for B3 futures operation."
        validation_method: "Validate reference symbols during market-context testing."
        impact_if_false: "Block unsupported symbols or brokers before live operation."
      - id: "BRD.01.10.1473"
        assumption: "Manual MetaEditor compile remains acceptable for v1."
        validation_method: "Confirm release workflow during v1.0 sign-off."
        impact_if_false: "Create a later automation BRD or change record."

## Acceptance Criteria and Success Validation
acceptance_criteria:
  launch_gates:
    must_have:
      - "All P1 functional requirements have downstream PRD, EARS, SPEC, TDD, and IPLAN traceability."
      - "Guarded execution blocks catastrophic framework-mediated order cases in the v1.0 test set."
      - "Netting and hedging ownership behavior is validated for same-symbol strategy instances."
      - "B3 futures sizing and broker-session behavior are validated for the v1 symbol set."
      - "Trade intent and execution evidence is produced for accepted entry attempts."
      - "Vendored standard-library version evidence is recorded."
      - "Two reference strategies and strategy-authoring documentation are available."
    should_have:
      - "Matched benchmark overhead evidence is <=10% versus baseline."
      - "Low-I/O idle path and optimization behavior are validated."
      - "Architecture diagrams are migrated through charts-flow and linked to downstream artifacts."
  post_launch_validation:
    thirty_day_metrics:
      - "At least two reference strategies compile and run through framework helpers."
      - "No known framework-mediated catastrophic order path remains open."
      - "No unresolved P1 safety finding remains in the v1.0 audit trail."
    ninety_day_decision_gate:
      continue: "Start the next BRD cycle for equities, pyramiding, or analytics if v1 platform safety and authoring goals pass."
      pivot: "Revise architecture if account-mode isolation or recovery behavior fails validation."
      maintain: "Maintain v1 if strategy authoring and safety goals pass but no new platform scope is justified."
      shutdown: "Stop live-use progression if safety gates cannot be validated."

## Business Risk Management
risk_management:
  risks:
    - id: "BRD.01.12.5c81"
      description: "A sizing or side logic defect could send unsafe order volume."
      likelihood: Medium
      impact: High
      mitigation: "Require a single guarded trade path, catastrophic caps, and test evidence before live use."
      owner: "Technical Lead"
    - id: "BRD.01.12.5985"
      description: "Strategy-scoped virtual ownership may drift from broker aggregate exposure on netting accounts."
      likelihood: Medium
      impact: High
      mitigation: "Require ownership evidence, recovery rules, and halt-on-ambiguity behavior."
      owner: "Technical Lead"
    - id: "BRD.01.12.74e8"
      description: "Silent terminal standard-library updates could change framework behavior between builds."
      likelihood: Medium
      impact: Medium
      mitigation: "Vendor selected standard-library dependencies and record source terminal version."
      owner: "Technical Lead"
    - id: "BRD.01.12.0224"
      description: "Planning documents and implementation decisions may diverge during phased build."
      likelihood: Medium
      impact: Medium
      mitigation: "Use aidoc traceability, audits, and changelog governance before moving to implementation."
      owner: "Product Owner"

