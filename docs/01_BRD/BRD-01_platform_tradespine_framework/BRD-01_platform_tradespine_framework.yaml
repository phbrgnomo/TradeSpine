## Quality Expectations
quality_expectations:
  expectations:
    - category: safety
      expectation: "Framework-mediated order flow blocks catastrophic order submission before broker handoff."
    - category: reliability
      expectation: "Ambiguous strategy ownership or recovery state stops the affected strategy rather than guessing safe exposure."
    - category: auditability
      expectation: "Trade intent and execution outcomes are paired for post-trade review."
    - category: performance
      expectation: "Matched benchmark overhead is <=10% versus baseline strategy runs."
    - category: maintainability
      expectation: "New strategy files contain strategy logic and behavior selection, not repeated infrastructure."
    - category: reproducibility
      expectation: "Framework standard-library dependencies are frozen and version-recorded."
    - category: operability
      expectation: "Operator-facing halt, warning, and rejection states are visible in logs or chart output."

## Constraints and Assumptions
constraints_and_assumptions:
  constraints:
    items:
      - id: "BRD.01.10.b11c"
        category: Scope
        description: "v1 strategy instances are single-symbol and attach to one chart symbol."
