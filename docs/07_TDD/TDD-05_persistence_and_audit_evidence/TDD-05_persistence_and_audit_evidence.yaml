test_cases:
  unit_tests:
    cases:
      - id: "TDD.05.04.e64a"
        type: unit
        name: "Key builder produces deterministic bounded GV names"
        spec_ref: "@spec: SPEC-05"
        target: "CKeyBuilder.Build"
        test_file: "Scripts/Tests/Test_StateStore.mq5"
        test_function: "test_persistence_and_audit_evidence_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "account=123, symbol=WINM26, magic=42, scope=halt"
        expected_output:
          type: contract-result
          value: "Hashed key fits terminal GV constraints and raw identity is absent"
        edge_cases:
          - condition: "Identity hash mismatch reports KeyCollision"
            expected: "Case remains deterministic and broker-safe."
  integration_tests:
    cases:
      - id: "TDD.05.04.229f"
        type: integration
        name: "TradeLogger pairs intent and execution records"
        spec_ref: "@spec: SPEC-05"
        contract: "TradeLogger plus file sink"
        test_file: "Scripts/Tests/Test_TradeLogger.mq5"
        test_function: "test_persistence_and_audit_evidence_integration_contract"
        setup:
          - "Assemble component with deterministic fakes for broker, clock, store, symbol, and logs where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "Write intent then execution for same order_intent_id"
        expected_state:
          - "CSV rows share strategy_run_id and remain separate from diagnostics"
        error_paths:
          - condition: "Write failure returns LogFailure without changing broker result"
            expected_error: "SPEC-defined rejection or HALT path."
  e2e_tests:
    cases:
      - id: "TDD.05.04.ed21"
        type: e2e
        name: "Evidence records remain paired and separated"
        bdd_ref: "@bdd: BDD.01.03.d6ae"
        spec_ref: "@spec: SPEC-05"
        test_file: "Scripts/Tests/Test_AlertSink.mq5"
        test_function: "test_persistence_and_audit_evidence_e2e_acceptance"
        workflow:
          - step: 1
            action: "Submit accepted trade through fake pipeline"
            expected: "Intent and execution pair is complete"
          - step: 2
            action: "Write diagnostic log and trade evidence"
            expected: "Diagnostic log is not mixed into trade CSV"
          - step: 3
            action: "Read evidence outputs"
            expected: "Missing pair fails the harness"
        timeout_seconds: 300
        cleanup: "Clear fake broker state, fake stores, generated evidence files, and chart objects under the strategy prefix."
  security_tests:
    cases: []

