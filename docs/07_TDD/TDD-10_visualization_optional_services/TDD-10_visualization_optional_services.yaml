test_cases:
  unit_tests:
    cases:
      - id: "TDD.10.04.7972"
        type: unit
        name: "No-op renderer accepts render events without side effects"
        spec_ref: "@spec: SPEC-10"
        target: "CNoopRenderer.Render"
        test_file: "Scripts/Tests/Test_ChartRenderer.mq5"
        test_function: "test_visualization_optional_services_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "RenderEvent kind=entry, enabled=false"
        expected_output:
          type: contract-result
          value: "RenderSkipped or success-noop and zero chart API calls"
        edge_cases:
          - condition: "Cleanup on disabled renderer is idempotent"
            expected: "Case remains deterministic and broker-safe."
  integration_tests:
    cases:
      - id: "TDD.10.04.7ca8"
        type: integration
        name: "Chart renderer scopes object names by strategy identity"
        spec_ref: "@spec: SPEC-10"
        contract: "CChartObjectRenderer plus fake chart API"
        test_file: "Scripts/Tests/Test_VisualizationPerformance.mq5"
        test_function: "test_visualization_optional_services_integration_contract"
        setup:
          - "Assemble component with deterministic fakes for broker, clock, store, symbol, and logs where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "Render entry and stop events for two magics"
        expected_state:
          - "Object names include strategy prefix and do not collide"
        error_paths:
          - condition: "Chart API failure emits optional diagnostic only"
            expected_error: "SPEC-defined rejection or HALT path."
  e2e_tests:
    cases:
      - id: "TDD.10.04.d9a2"
        type: e2e
        name: "Visualization stays disabled in optimization hot path"
        bdd_ref: "@bdd: BDD.01.03.b37d"
        spec_ref: "@spec: SPEC-10"
        test_file: "Scripts/Tests/Test_VisualizationPerformance.mq5"
        test_function: "test_visualization_optional_services_e2e_acceptance"
        workflow:
          - step: 1
            action: "Set optimization runtime mode"
            expected: "No chart object writes occur"
          - step: 2
            action: "Emit repeated render events"
            expected: "Execution and state outputs are unchanged"
          - step: 3
            action: "Measure fake sink calls"
            expected: "Idle-path budget evidence remains within threshold"
        timeout_seconds: 300
        cleanup: "Clear fake broker state, fake stores, generated evidence files, and chart objects under the strategy prefix."
  security_tests:
    cases: []

