test_cases:
  unit_tests:
    cases:
      - id: "TDD.02.04.30a8"
        type: unit
        name: "Signal normalizes market entry intent"
        spec_ref: "@spec: SPEC-02"
        target: "CTradeCoordinator.ProcessSignal"
        test_file: "Scripts/Tests/Test_Coordinator.mq5"
        test_function: "test_trade_coordination_pipeline_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "Signal type=long, market mode, explicit SL/TP unset"
        expected_output:
          type: contract-result
          value: "TradeIntent uses broker bid/ask and policy-derived stops"
        edge_cases:
          - condition: "Invalid or placeholder entry modes reject before intent evidence"
            expected: "Case remains deterministic and broker-safe."
  integration_tests:
    cases:
      - id: "TDD.02.04.20da"
        type: integration
        name: "Coordinator writes intent before guarded submission"
        spec_ref: "@spec: SPEC-02"
        contract: "CTradeCoordinator plus fake logger and trade port"
        test_file: "Scripts/Tests/Test_CoordinatorUpdate.mq5"
        test_function: "test_trade_coordination_pipeline_integration_contract"
        setup:
          - "Assemble component with deterministic fakes for broker, clock, store, symbol, and logs where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "Submit accepted entry through ProcessSignal"
        expected_state:
          - "Intent record precedes broker submission and execution record follows reconciliation"
        error_paths:
          - condition: "Stop-policy zero distance blocks before sizing"
            expected_error: "SPEC-defined rejection or HALT path."
  e2e_tests:
    cases:
      - id: "TDD.02.04.8e76"
        type: e2e
        name: "Accepted framework-mediated order has paired evidence"
        bdd_ref: "@bdd: BDD.01.03.0073"
        spec_ref: "@spec: SPEC-02"
        test_file: "Scripts/Tests/Test_TradeIntentEvidence.mq5"
        test_function: "test_trade_coordination_pipeline_e2e_acceptance"
        workflow:
          - step: 1
            action: "Create valid helper request"
            expected: "Intent and execution share strategy_run_id and order_intent_id"
          - step: 2
            action: "Run coordinator and fake broker success path"
            expected: "State machine receives broker outcome"
          - step: 3
            action: "Read evidence sink"
            expected: "No accepted entry lacks paired records"
        timeout_seconds: 300
        cleanup: "Clear fake broker state, fake stores, generated evidence files, and chart objects under the strategy prefix."
  security_tests:
    cases: []

