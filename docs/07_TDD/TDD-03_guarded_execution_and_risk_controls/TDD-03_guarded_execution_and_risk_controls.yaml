test_cases:
  unit_tests:
    cases:
      - id: "TDD.03.04.1f65"
        type: unit
        name: "GuardResult classifies unknown retcodes as ambiguous"
        spec_ref: "@spec: SPEC-03"
        target: "CGuardedTrade.ClassifyRetcode"
        test_file: "Scripts/Tests/Test_GuardedTrade.mq5"
        test_function: "test_guarded_execution_and_risk_controls_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "retcode=999999, ordercheck=0, ticket=0"
        expected_output:
          type: contract-result
          value: "status=halted, ambiguous=true, retryable=false"
        edge_cases:
          - condition: "Known success, pending, retryable, and terminal retcodes classify distinctly"
            expected: "Case remains deterministic and broker-safe."
  integration_tests:
    cases:
      - id: "TDD.03.04.b003"
        type: integration
        name: "Catastrophic guard blocks private CTrade submission"
        spec_ref: "@spec: SPEC-03"
        contract: "CGuardedTrade plus fake private CTrade"
        test_file: "Scripts/Tests/Test_RiskManager.mq5"
        test_function: "test_guarded_execution_and_risk_controls_integration_contract"
        setup:
          - "Assemble component with deterministic fakes for broker, clock, store, symbol, and logs where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "Submit TradeIntent with side-inverted stop"
        expected_state:
          - "Rejected GuardResult and zero private CTrade calls"
        error_paths:
          - condition: "OrderCheck failure stores preflight reason"
            expected_error: "SPEC-defined rejection or HALT path."
  e2e_tests:
    cases:
      - id: "TDD.03.04.1861"
        type: e2e
        name: "Unsafe order is rejected before broker handoff"
        bdd_ref: "@bdd: BDD.01.03.9a8b"
        spec_ref: "@spec: SPEC-03"
        test_file: "Scripts/Tests/Test_BrokerBypassScan.mq5"
        test_function: "test_guarded_execution_and_risk_controls_e2e_acceptance"
        workflow:
          - step: 1
            action: "Build invalid TradeIntent"
            expected: "Broker handoff count remains zero"
          - step: 2
            action: "Run guard pipeline"
            expected: "Diagnostic rejection reason is recorded"
          - step: 3
            action: "Inspect fake broker call counter"
            expected: "Coordinator receives rejected result"
        timeout_seconds: 300
        cleanup: "Clear fake broker state, fake stores, generated evidence files, and chart objects under the strategy prefix."
