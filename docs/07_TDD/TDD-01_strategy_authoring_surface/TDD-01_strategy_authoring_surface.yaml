test_cases:
  unit_tests:
    cases:
      - id: "TDD.01.04.c4a3"
        type: unit
        name: "Lifecycle rejects helper before Live"
        spec_ref: "@spec: SPEC-01"
        target: "CStrategyBase.OpenLong"
        test_file: "Scripts/Tests/Test_StrategyBase.mq5"
        test_function: "test_strategy_authoring_surface_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "phase=StrategyInit, comment=prelive"
        expected_output:
          type: contract-result
          value: "0 ticket and no coordinator call"
        edge_cases:
          - condition: "Live phase with registered ready indicators routes through coordinator"
            expected: "Case remains deterministic and broker-safe."
  integration_tests:
    cases:
      - id: "TDD.01.04.65b2"
        type: integration
        name: "Strategy helper routes entries and exits through coordinator"
        spec_ref: "@spec: SPEC-01"
        contract: "CStrategyBase plus mock CTradeCoordinator"
        test_file: "Scripts/Tests/Test_StrategyTemplateCompile.mq5"
        test_function: "test_strategy_authoring_surface_integration_contract"
        setup:
          - "Assemble component with deterministic fakes for broker, clock, store, symbol, and logs where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "Assemble strategy, call OpenLong and CloseAll after Live"
        expected_state:
          - "Entry and close branches receive normalized requests; strategy does not call broker APIs"
        error_paths:
          - condition: "Missing required override returns INIT_FAILED"
            expected_error: "SPEC-defined rejection or HALT path."
  e2e_tests:
    cases:
      - id: "TDD.01.04.fe35"
        type: e2e
        name: "Shipped strategy artifacts compile with shared includes"
        bdd_ref: "@bdd: BDD.01.03.aa68"
        spec_ref: "@spec: SPEC-01"
        test_file: "Scripts/Tests/Test_AuthoringDocsChecklist.mq5"
        test_function: "test_strategy_authoring_surface_e2e_acceptance"
        workflow:
          - step: 1
            action: "Compile DonchianBreakout sample"
            expected: "One mq5 strategy plus shared includes per artifact"
          - step: 2
            action: "Compile MovingAverageCross sample"
            expected: "No raw broker API bypass in strategy files"
          - step: 3
            action: "Compile approved hedging ports"
            expected: "Authoring checklist evidence is present"
        timeout_seconds: 300
        cleanup: "Clear fake broker state, fake stores, generated evidence files, and chart objects under the strategy prefix."
  security_tests:
