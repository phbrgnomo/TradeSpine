      output: "TradeSpine source files for the parent SPEC."
    - phase: 4
      name: "Verify (Green)"
      action: "Run the declared tests and confirm the expected pass criteria."
      output: "Green test report and evidence pack."
    - phase: 5
      name: "Refactor"
      action: "Clean implementation without changing the test-observed behavior."
      output: "Refactored source with tests still green."

