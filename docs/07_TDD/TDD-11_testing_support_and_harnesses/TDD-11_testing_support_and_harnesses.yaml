test_cases:
  unit_tests:
    cases:
      - id: "TDD.11.04.6805"
        type: unit
        name: "Shared clock and assertion helpers behave deterministically"
        spec_ref: "@spec: SPEC-11"
        target: "FakeClock/CAssert"
        test_file: "Scripts/Tests/Test_TestSupportClock.mq5"
        test_function: "test_testing_support_and_harnesses_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "time_sequence=[t0,t1,t2]"
        expected_output:
          type: contract-result
          value: "Clock advances in configured order; negative Advance() is rejected; assertions report deterministic pass/fail/skip counts including Snapshot/Restore round-trip across all four fields"
        edge_cases:
          - condition: "Negative seconds passed to Advance()"
            expected: "FakeClock rejects the call and Now() remains unchanged."
  integration_tests:
    cases:
      - id: "TDD.11.04.aadd"
        type: integration
        name: "ScenarioHarness assembles fakes and evidence assertions"
        spec_ref: "@spec: SPEC-11"
        contract: "ScenarioHarness"
        test_file: "Scripts/Tests/Test_TestSupportScenarioHarness.mq5"
        test_function: "test_testing_support_and_harnesses_integration_contract"
        setup:
          - "Assemble component with deterministic shared fakes for clock, logs, runtime, and owner-extension hooks where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "Component plus FakeClock, FakeLogSink, CAssert, minimal ScenarioHarness, and deferred owner-extension slots"
        expected_state:
          - "Stimulus runs with deterministic time and evidence assertions fail on missing required traces"
        error_paths:
          - condition: "Owner extension slot is missing for a scenario that requires broker, position, symbol, or store behavior"
            expected_error: "Harness reports the missing owner extension and leaves the owner-specific assertion to the downstream IPLAN."
  e2e_tests:
    cases:
      - id: "TDD.11.04.4f72"
        type: e2e
        name: "Deferred account-mode evidence stays manual where required"
        bdd_ref: "@bdd: BDD.01.03.f415"
        spec_ref: "@spec: SPEC-11"
        test_file: "Scripts/Tests/Test_ReleaseEvidenceHarness.mq5"
        test_function: "test_testing_support_and_harnesses_e2e_acceptance"
        workflow:
          - step: 1
            action: "Run harness for netting deferred init failure"
            expected: "Automated Strategy Tester evidence is not substituted for manual pack"
          - step: 2
            action: "Attach manual evidence pack reference"
            expected: "Missing pack blocks release gate"
          - step: 3
            action: "Run release evidence validation"
            expected: "No trade-path side effects are recorded"
        timeout_seconds: 300
        cleanup: "Clear shared fake state, generated evidence files, and chart objects under the strategy prefix."

owner_extension_scope:
  deferred_to_owner_plans:
    - owner: "IPLAN-03"
      scope: "FakeTradePort, GuardResult, TradeIntent, broker outcome scripts, pending/ambiguous execution assertions."
    - owner: "IPLAN-04"
      scope: "Position/account context fakes, IPositionView-backed harness adapters, hedging ownership assertions."
    - owner: "IPLAN-05"
      scope: "State-store and persistence/evidence fakes, write/read failure injection, audit ledger assertions."
    - owner: "IPLAN-06"
      scope: "Symbol context and market-session fakes for sizing, stops, spread, fill mode, and session gates."
  security_tests:
    cases: []

thresholds:
  unit:
    coverage_target: ">=90%"
    pass_criteria:
      - "All declared unit cases pass."
      - "No broker API calls occur from unit tests."
    fail_action: "Block IPLAN Green phase."
  integration:
    coverage_target: ">=85%"
    pass_criteria:
      - "All declared integration contracts pass."
      - "Fake-boundary assertions prove the expected side effects."
    fail_action: "Block IPLAN Green phase."
  e2e:
    coverage_target: ">=75% of mapped happy paths"
    timeout_budget: "<=300s"
    pass_criteria:
      - "Critical BDD workflow passes."
      - "Required evidence artifacts are present."
    fail_action: "Block release-candidate gate."
  security:
    coverage_target: "Not mandated by parent SPEC."
    pass_criteria:
      - "No security cases are required for this component."
    fail_action: "Add cases if a later ADR or SPEC mandates security coverage."

