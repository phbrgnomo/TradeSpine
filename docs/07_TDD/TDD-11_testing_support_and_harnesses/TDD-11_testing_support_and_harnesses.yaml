test_cases:
  unit_tests:
    cases:
      - id: "TDD.11.04.6805"
        type: unit
        name: "FakeTradePort returns scripted broker outcomes in order"
        spec_ref: "@spec: SPEC-11"
        target: "FakeTradePort.Submit"
        test_file: "Scripts/Tests/Test_TestSupportTradePort.mq5"
        test_function: "test_testing_support_and_harnesses_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "script=[pending, fill, ambiguous]"
        expected_output:
          type: contract-result
          value: "Each Submit returns the next GuardResult and exhaustion fails the test"
        edge_cases:
          - condition: "Configured retry retcodes preserve order"
            expected: "Case remains deterministic and broker-safe."
  integration_tests:
    cases:
      - id: "TDD.11.04.aadd"
        type: integration
        name: "ScenarioHarness assembles fakes and evidence assertions"
        spec_ref: "@spec: SPEC-11"
        contract: "ScenarioHarness"
        test_file: "Scripts/Tests/Test_TestSupportScenarioHarness.mq5"
        test_function: "test_testing_support_and_harnesses_integration_contract"
        setup:
          - "Assemble component with deterministic fakes for broker, clock, store, symbol, and logs where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "Component plus FakeClock, FakeTradePort, FakeStateStore, FakeSymbolContext, FakeLogSink"
        expected_state:
          - "Stimulus runs with deterministic time and evidence assertions fail on missing required traces"
        error_paths:
          - condition: "Store read/write failure is injectable"
            expected_error: "SPEC-defined rejection or HALT path."
  e2e_tests:
    cases:
      - id: "TDD.11.04.4f72"
        type: e2e
        name: "Deferred account-mode evidence stays manual where required"
        bdd_ref: "@bdd: BDD.01.03.f415"
        spec_ref: "@spec: SPEC-11"
        test_file: "Scripts/Tests/Test_ReleaseEvidenceHarness.mq5"
        test_function: "test_testing_support_and_harnesses_e2e_acceptance"
        workflow:
          - step: 1
            action: "Run harness for netting deferred init failure"
            expected: "Automated Strategy Tester evidence is not substituted for manual pack"
          - step: 2
            action: "Attach manual evidence pack reference"
            expected: "Missing pack blocks release gate"
          - step: 3
            action: "Run release evidence validation"
            expected: "No trade-path side effects are recorded"
        timeout_seconds: 300
        cleanup: "Clear fake broker state, fake stores, generated evidence files, and chart objects under the strategy prefix."
  security_tests:
    cases: []

