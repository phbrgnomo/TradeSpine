      - "Fake-boundary assertions prove the expected side effects."
    fail_action: "Block IPLAN Green phase."
  e2e:
    coverage_target: ">=75% of mapped happy paths"
    timeout_budget: "<=300s"
    pass_criteria:
      - "Critical BDD workflow passes."
      - "Required evidence artifacts are present."
    fail_action: "Block release-candidate gate."
  security:
    coverage_target: "Not mandated by parent SPEC."
    pass_criteria:
      - "No security cases are required for this component."
    fail_action: "Add cases if a later ADR or SPEC mandates security coverage."

