        test_file: "Scripts/Tests/Test_SafeMathAndNewBar.mq5"
        test_function: "test_core_runtime_and_configuration_e2e_acceptance"
        workflow:
          - step: 1
            action: "Bind CommonInputs with equity sizing placeholder"
            expected: "Initialization fails or feature is visibly rejected"
          - step: 2
            action: "Run framework init validation"
            expected: "No silent mapping to futures sizing occurs"
          - step: 3
            action: "Inspect diagnostic output"
            expected: "Operator diagnostic names the unsupported v1 option"
