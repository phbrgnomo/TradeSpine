test_cases:
  unit_tests:
    cases:
      - id: "TDD.09.04.f745"
        type: unit
        name: "SafeMath rejects non-finite and off-grid values"
        spec_ref: "@spec: SPEC-09"
        target: "SafeMath.NormalizePrice"
        test_file: "Scripts/Tests/Test_CommonInputs.mq5"
        test_function: "test_core_runtime_and_configuration_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "price=NaN or price off tick grid"
        expected_output:
          type: contract-result
          value: "false or normalized grid value per symbol metadata"
        edge_cases:
          - condition: "Lot-grid clamp respects min, max, and step"
            expected: "Case remains deterministic and broker-safe."
  integration_tests:
    cases:
      - id: "TDD.09.04.8050"
        type: integration
        name: "OptContext disables high-I/O diagnostics in optimization"
        spec_ref: "@spec: SPEC-09"
        contract: "OptContext plus Profiler and fake log sink"
        test_file: "Scripts/Tests/Test_OptContextProfiler.mq5"
        test_function: "test_core_runtime_and_configuration_integration_contract"
        setup:
          - "Assemble component with deterministic fakes for broker, clock, store, symbol, and logs where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "tester=true, optimization=true, audit_in_optimization=false"
        expected_state:
          - "Profiler and logging return without persistent writes"
        error_paths:
          - condition: "Audit-enabled optimization records bounded evidence only"
            expected_error: "SPEC-defined rejection or HALT path."
  e2e_tests:
    cases:
      - id: "TDD.09.04.bb66"
        type: e2e
        name: "Common inputs reject unsupported v2 placeholders"
        bdd_ref: "@bdd: BDD.01.03.cb03"
