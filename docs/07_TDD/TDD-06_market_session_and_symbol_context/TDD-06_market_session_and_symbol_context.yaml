test_cases:
  unit_tests:
    cases:
      - id: "TDD.06.04.8f4d"
        type: unit
        name: "Symbol context rejects missing required metadata"
        spec_ref: "@spec: SPEC-06"
        target: "CSymbolContext.Init"
        test_file: "Scripts/Tests/Test_SymbolContext.mq5"
        test_function: "test_market_session_and_symbol_context_unit_contract"
        inputs:
          - name: fixture
            type: string
            value: "tick_size=0, lot_step=1, trade_mode=enabled"
        expected_output:
          type: contract-result
          value: "INIT_FAILED with missing metadata reason"
        edge_cases:
          - condition: "Valid B3 futures metadata is immutable after init"
            expected: "Case remains deterministic and broker-safe."
  integration_tests:
    cases:
      - id: "TDD.06.04.4796"
        type: integration
        name: "Session context blocks entries but allows exposure management"
        spec_ref: "@spec: SPEC-06"
        contract: "CSessionContext plus fake broker clock"
        test_file: "Scripts/Tests/Test_SessionContext.mq5"
        test_function: "test_market_session_and_symbol_context_integration_contract"
        setup:
          - "Assemble component with deterministic fakes for broker, clock, store, symbol, and logs where required."
          - "Load SPEC-defined configuration and BDD trace tags."
        action:
          description: "Market open, user trading hours closed"
        expected_state:
          - "Entry gate is blocked and close-management path remains available"
        error_paths:
          - condition: "Close buffer sets day_trade_close_required"
            expected_error: "SPEC-defined rejection or HALT path."
  e2e_tests:
    cases:
      - id: "TDD.06.04.cd48"
        type: e2e
        name: "Day-trade mode closes exposure before market close"
        bdd_ref: "@bdd: BDD.01.03.d4a5"
        spec_ref: "@spec: SPEC-06"
        test_file: "Scripts/Tests/Test_ContractLifecycle.mq5"
        test_function: "test_market_session_and_symbol_context_e2e_acceptance"
        workflow:
          - step: 1
            action: "Create owned positions and pending orders"
            expected: "Owned exposure is closed or cancelled"
          - step: 2
            action: "Advance broker time into close buffer"
            expected: "Failure enters HALT with evidence"
          - step: 3
            action: "Run close sequence"
            expected: "No rollover is accepted for day-trade mode"
        timeout_seconds: 300
        cleanup: "Clear fake broker state, fake stores, generated evidence files, and chart objects under the strategy prefix."
  security_tests:
    cases: []

