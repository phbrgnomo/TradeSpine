## Feature Definition
feature_definition:
  feature_name: "TradeSpine v1 platform acceptance"
  user_story: >
    As an owner-operator trader, I want TradeSpine v1 platform behavior captured
    as executable Given-When-Then scenarios, so that architecture and technical
    specifications preserve the approved safety, execution, evidence, account
    mode, market-session, and release-governance requirements.
  business_value: >
    Converts approved formal requirements into reviewable acceptance behavior
    before ADR and SPEC decisions are made.
  background:
    timezone: "America/Bahia"
    assumptions:
      - "B3 futures symbols are the v1 market scope."
      - "Broker server time is the source of truth for session checks."
      - "TradeSpine helpers are the only supported path for framework-mediated order submission."
      - "v1 release sign-off requires deferred-mode init-failure evidence for netting and exchange-netting; manual concurrent netting evidence is deferred to v2+."
    gherkin: |
      Background:
        Given a TradeSpine v1 strategy instance is attached to one chart symbol
        And the strategy has a unique account-symbol-magic identity
        And required symbol metadata is available unless the scenario states otherwise
        And diagnostic logging and trade-evaluation evidence stores are enabled

