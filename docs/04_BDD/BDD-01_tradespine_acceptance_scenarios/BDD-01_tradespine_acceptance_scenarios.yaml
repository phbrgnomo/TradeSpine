## Glossary
glossary:
  market_trade_session: "Broker/exchange trading session for the chart symbol."
  user_trading_hours: "Operator-defined strategy entry window; exits and risk management remain allowed outside this window."
  day_trade_mode: "Mode where strategy-owned positions and pending orders must be closed before the market session day boundary."
  netting: "Deferred v2+ account mode where the broker exposes an aggregate position per symbol and TradeSpine will need strategy-scoped virtual ownership."
  hedging: "Account mode where broker tickets or orders can represent separate strategy-owned exposure."
  halt: "Safety state that blocks non-emergency trading helpers and preserves last-known state for operator review."
  trade_evaluation_record: "Trade outcome evidence used for strategy evaluation, distinct from diagnostic logs."
  diagnostic_log: "Strategy or framework diagnostic evidence used to audit code behavior."
