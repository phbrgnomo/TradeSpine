## Glossary
glossary:
  terms:
    - term: TradeSpine
      definition: "MT5 strategy framework product for B3 futures."
    - term: Framework-mediated trade
      definition: "Trade action requested through TradeSpine helper and safety paths."
    - term: Strategy ownership
      definition: "Strategy-scoped accounting and evidence that separates one strategy from another."
    - term: Diagnostic log
      definition: "Strategy and framework audit trail for code-path decisions, rejections, halts, and recovery behavior."
    - term: Trade evaluation record
      definition: "Structured intent and execution evidence used to evaluate strategy trading outcomes."
    - term: Netting ownership invariant
      definition: "Deferred v2+ invariant: in netting and exchange-netting account modes, broker exposure is symbol-aggregate, so TradeSpine must preserve strategy-scoped ownership evidence outside the aggregate broker position."
    - term: Hedging ownership invariant
      definition: "In hedging account mode, TradeSpine records ownership against relevant broker tickets or orders while preserving the same strategy-scoped evidence model."
    - term: Runtime risk controls
      definition: "Per-EA limits for daily loss, max open lots, max trades per day, and a strategy-scoped panic stop."
    - term: Strategy-scoped panic stop
      definition: "Operator control that stops the current TradeSpine strategy instance without claiming to manage unrelated strategies."
    - term: Two-layer session model
      definition: "Entry gating model requiring both market trade-session availability and the configured user trading-hours window in broker/server time."
    - term: Manual netting evidence pack
      definition: "Deferred v2+ live or demo evidence used to validate concurrent same-symbol netting behavior that the MT5 Strategy Tester cannot automate."
    - term: Placeholder sizing mode
      definition: "Visible but non-production sizing option reserved for a later release boundary."
    - term: Duplicate magic guard
      definition: "Initialization safety check that prevents or safely recovers duplicate account-symbol-magic ownership collisions."
    - term: Day-trade auto-close
      definition: "Mode that performs a complete strategy stop before market session close and prevents strategy-owned positions from rolling overnight."
    - term: Indicator-readiness gate
      definition: "Entry gate that blocks strategy entries while required indicator data is still loading."
    - term: Contract expiration warning
      definition: "Operator-facing warning at session open when a supported futures contract expires in one broker day."
    - term: Slippage points
      definition: "Difference between intended trade price and actual fill price recorded for trade evaluation."
    - term: Intent evidence
      definition: "Pre-submission record of the strategy trade request."
    - term: Execution evidence
      definition: "Post-submission record of broker outcome and strategy ownership state."
    - term: EARS
      definition: "Layer 3 formal requirements syntax used after this PRD."
