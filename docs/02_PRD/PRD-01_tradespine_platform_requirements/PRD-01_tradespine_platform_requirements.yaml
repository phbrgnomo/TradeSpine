## Scope and Requirements
scope_and_requirements:
  in_scope:
    features:
      - id: "PRD.01.07.2878"
        name: "Strategy authoring workspace"
        priority: P1-Must
        description: "Template, implementation guide, and reference strategy structure that lets a strategy author focus on signal logic and behavior selection."
        brd_reference: "@brd: BRD.01.07.88a6"
      - id: "PRD.01.07.0b72"
        name: "Execution safety path"
        priority: P1-Must
        description: "Product behavior that routes framework-mediated entries through safety, session, risk, broker, and evidence gates."
        brd_reference: "@brd: BRD.01.07.a94e"
      - id: "PRD.01.07.7733"
        name: "Runtime risk controls"
        priority: P1-Must
        description: "Per-EA daily loss, max open lots, max trades per day, and strategy-scoped panic stop that can refuse entries or close this strategy when tripped."
        brd_reference: "@brd: BRD.01.07.a94e"
      - id: "PRD.01.07.6107"
        name: "Account-mode ownership"
        priority: P1-Must
        description: "Product behavior that lets same-symbol strategies maintain strategy-scoped ownership on hedging accounts and fail safely for deferred netting/exchange modes."
        brd_reference: "@brd: BRD.01.07.b44d"
      - id: "PRD.01.07.3ab9"
        name: "B3 futures market context"
        priority: P1-Must
        description: "Product behavior for v1 futures sizing modes, broker-session awareness, user trading-hours windows, and symbol metadata validation."
        brd_reference: "@brd: BRD.01.07.69ef"
      - id: "PRD.01.07.f540"
        name: "Trade audit exports"
        priority: P1-Must
        description: "Separated diagnostic logs and structured trade evaluation evidence suitable for code audit and Python-side post-trade analysis."
        brd_reference: "@brd: BRD.01.07.8e15"
      - id: "PRD.01.07.1bce"
        name: "Testability and release evidence"
        priority: P1-Must
        description: "Release gates that prove safety, hedging ownership, deferred account-mode behavior, reference strategy behavior, benchmark targets, and documentation governance before v1.0."
        brd_reference: "@brd: BRD.01.07.717b"
  dependencies:
    technical: "MetaTrader 5, MQL5, selected vendored standard-library files, and local diagram rendering."
    business: "Owner approval of BRD-01 and acceptance of v1 scope boundaries."
    external: "Broker symbol metadata, account mode behavior, and B3 futures market-session data."
  out_of_scope:
    - "B3 equities sizing implementation; reserved for a later BRD cycle."
    - "Pyramiding, partial-close manager, and advanced exit manager."
    - "Multi-symbol, portfolio, UI panel, and WebRequest product surfaces."
    - "Custom optimization criteria and Python analytics implementation."

## User Stories and User Roles
user_stories:
  layer_separation_note: "Detailed behaviors live in EARS; executable scenarios live in BDD."
  roles:
    - role: "Strategy Author"
      description: "Creates and tests strategy files that call TradeSpine helpers."
    - role: "Live Operator"
      description: "Configures risk, session, and safety inputs before trading."
    - role: "Post-Trade Analyst"
      description: "Reviews exported trade evidence outside the MQL5 tree."
    - role: "Release Reviewer"
      description: "Confirms tests, diagrams, docs, and launch gates before progression."
  stories:
    - id: "PRD.01.08.03b6"
      role: "Strategy Author"
      want: "to write a strategy as one strategy file"
      so_that: "signal logic is not mixed with repeated execution infrastructure"
      priority: P1
      acceptance_criteria:
        - "Each simple sample and hedging port strategy artifact compiles without direct broker execution includes in the strategy file."
        - "The strategy calls documented framework helpers for entries and exits."
        - "The v1 strategy implementation guide explains the strategy file structure, lifecycle hooks, helper calls, common inputs, logging expectations, compile checklist, and reference-strategy walkthrough."
      brd_reference: "@brd: BRD.01.07.88a6"
    - id: "PRD.01.08.fde4"
      role: "Live Operator"
      want: "to configure safety, session, and sizing behavior per chart"
      so_that: "framework-mediated trades respect the intended operating limits"
      priority: P1
      acceptance_criteria:
        - "Unsafe framework-mediated entry attempts are rejected before broker handoff."
        - "Daily loss, max open lots, max trades per day, and panic stop controls can stop this strategy instance."
        - "Session and market-availability states can block new entries."
        - "The user trading-hours window and broker trading session must both allow entries."
      brd_reference: "@brd: BRD.01.07.a94e"
    - id: "PRD.01.08.2f83"
      role: "Post-Trade Analyst"
      want: "to review trade evaluation evidence separately from diagnostic logs"
      so_that: "strategy performance can be evaluated without mixing it with framework or strategy-code audit trails"
      priority: P1
      acceptance_criteria:
        - "Intent evidence is available before broker submission."
        - "Execution evidence includes broker outcome, intended price, actual fill price, slippage points, and strategy ownership context."
        - "Strategy/framework diagnostic logs are separated from trade evaluation records."
      brd_reference: "@brd: BRD.01.07.8e15"
    - id: "PRD.01.08.628e"
      role: "Release Reviewer"
      want: "to validate release gates from documented evidence"
      so_that: "the framework does not progress to code or release with unresolved P1 risks"
      priority: P1
      acceptance_criteria:
        - "P1 product gates have corresponding validation evidence."
        - "Netting and exchange-netting selections fail initialization with deferred-mode diagnostics; concurrent same-symbol netting evidence is deferred to v2+."
        - "Release governance checks required docs, same-change documentation updates, and CHANGELOG decision records."
        - "Deferred scope is explicit and does not block v1.0."
      brd_reference: "@brd: BRD.01.07.717b"

## Functional Requirements
functional_requirements:
  core_capabilities:
    - id: "PRD.01.09.9e71"
      name: "Strategy authoring surface"
      description: "TradeSpine shall expose a documented strategy template, implementation guide, lifecycle hooks, behavior-selection points, and reference strategies for B3 futures authors."
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.5ef1"
          criterion: "Reference strategy packaging"
          target: "DonchianBreakout, MovingAverageCross, 1minscalpv3_hedging.mq5, and BullishBearish Engulfing all v7 hedging.mq5 compile as one strategy file each plus shared framework includes"
        - id: "PRD.01.09.eaf3"
          criterion: "New strategy implementation guide"
          target: "Guide covers file structure, lifecycle hooks, helper calls, common inputs, logging expectations, compile checklist, simple-sample walkthrough, and hedging-port expectations"
      brd_reference: "@brd: BRD.01.07.88a6"
    - id: "PRD.01.09.88e3"
      name: "Guarded execution"
      description: "TradeSpine shall route framework-mediated entries through product safety checks before broker submission."
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.d74e"
          criterion: "Catastrophic safety coverage"
          target: "Unsafe framework-mediated order scenarios are rejected before broker handoff"
        - id: "PRD.01.09.4fb4"
          criterion: "Runtime risk controls"
          target: "Per-EA daily loss %, max open lots, max trades per day, and strategy-scoped panic stop are available as v1 operator controls"
        - id: "PRD.01.09.5963"
          criterion: "Indicator readiness gate"
          target: "Registered indicators that are not ready block entries until ready"
        - id: "PRD.01.09.7608"
          criterion: "Ambiguous fill or cancel ownership halts"
          target: "Ambiguous async fill, cancel, or reconciliation state enters HALT rather than guessing ownership"
      brd_reference: "@brd: BRD.01.07.a94e"
    - id: "PRD.01.09.aaf8"
      name: "Account-mode ownership"
      description: "TradeSpine shall keep strategy ownership separate on hedging accounts and fail safely before trading on deferred netting/exchange-netting account modes."
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.5cce"
          criterion: "Supported hedging account-mode validation"
          target: "Same-symbol strategy instances keep independent ownership evidence on hedging accounts"
        - id: "PRD.01.09.7767"
          criterion: "Netting/exchange deferred-mode invariant"
          target: "Netting and exchange-netting selections fail initialization before virtual ownership, pending-exit, execution-mutex, or trade paths become active"
        - id: "PRD.01.09.a252"
          criterion: "Hedging ownership invariant"
          target: "Hedging validation records strategy ownership per relevant broker ticket/order while preserving the same strategy-scoped evidence model"
        - id: "PRD.01.09.3f12"
          criterion: "Duplicate magic guard"
          target: "Same-terminal duplicate account symbol magic attachment fails or recovers only through documented stale-marker rules"
      brd_reference: "@brd: BRD.01.07.b44d"
    - id: "PRD.01.09.9cac"
      name: "B3 futures market context"
      description: "TradeSpine shall validate symbol metadata, broker session state, and futures sizing inputs for v1 B3 futures use."
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.fada"
          criterion: "Supported futures scope"
          target: "WIN, WDO, IND, and DOL validation evidence exists before v1.0"
        - id: "PRD.01.09.efcd"
          criterion: "Two-layer session model"
          target: "Entries require both market trade-session availability and the user trading-hours window in broker server time"
        - id: "PRD.01.09.60ad"
          criterion: "V1 sizing and v2 placeholder boundary"
          target: "V1 supports futures SIZING_RISK_PERCENT and SIZING_FIXED_LOT using initialized symbol information, while equity sizing modes remain visible v2 placeholders"
        - id: "PRD.01.09.d722"
          criterion: "Day-trade auto-close"
          target: "Day-trade mode performs a complete strategy stop before market session close, prevents overnight rollover, and blocks new entries for the remainder of the session"
        - id: "PRD.01.09.42eb"
          criterion: "Contract expiration warning"
          target: "Supported futures symbols surface a warning at session open when the contract expires in one broker day"
      brd_reference: "@brd: BRD.01.07.69ef"
    - id: "PRD.01.09.baed"
      name: "Audit evidence"
      description: "TradeSpine shall separate strategy/framework diagnostic logs from structured trade evaluation records, while producing paired intent and execution evidence that external analytics can consume."
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.9d68"
          criterion: "Evidence pairing"
          target: "Accepted entry attempts have intent and execution records"
        - id: "PRD.01.09.c622"
          criterion: "Diagnostic and trade-evaluation evidence separation"
          target: "Strategy/framework diagnostic logs are separate from structured trade intent and execution evidence used for strategy evaluation"
        - id: "PRD.01.09.c1fc"
          criterion: "Slippage evidence fields"
          target: "Trade evaluation records capture intended price, actual fill price, and slippage points for entries and exits"
      brd_reference: "@brd: BRD.01.07.8e15"
    - id: "PRD.01.09.841a"
      name: "Testability and release readiness"
      description: "TradeSpine shall provide release evidence that validates safety, ownership, performance, and documentation gates."
      priority: P1
      acceptance_criteria:
        - id: "PRD.01.09.4054"
          criterion: "Documentation and test readiness"
          target: "Authoring docs, two simple reference samples, two additional hedging strategy ports, and test evidence exist before downstream implementation sign-off"
        - id: "PRD.01.09.0764"
          criterion: "Deferred-mode release evidence"
          target: "Release sign-off includes evidence that netting and exchange-netting fail initialization in v1; manual concurrent netting evidence is deferred to v2+"
        - id: "PRD.01.09.4c66"
          criterion: "Documentation and release governance"
          target: "Release sign-off checks required docs, Doxygen coverage if retained, same-change documentation updates, and CHANGELOG decision record"
        - id: "PRD.01.09.3092"
          criterion: "Performance budgets"
          target: "Release evidence covers tester overhead <=10%, memory <=2 MB per EA, idle tick <=50 us, and low-I/O write budgets"
      brd_reference: "@brd: BRD.01.07.717b"
  user_journey:
    id: "PRD.01.09.9db1"
    diagram:
      type: sequenceDiagram
      content: |
        sequenceDiagram
          participant Trader
          participant Strategy
          participant TradeSpine
          participant Broker
          participant Evidence
          Trader->>Strategy: Configure inputs and start EA
          Strategy->>TradeSpine: Request framework-mediated trade
          alt Safety gates pass
            TradeSpine->>Broker: Submit trade request
            Broker-->>TradeSpine: Return outcome
            TradeSpine->>Evidence: Write intent and execution records
          else Safety gates fail
            TradeSpine-->>Strategy: Reject with reason
            TradeSpine->>Evidence: Record rejection evidence
          end
          Evidence-->>Trader: Support review
  diagram_contract:
    tags:
      - "@diagram: c4-l2"
      - "@diagram: dfd-l2"
      - "@diagram: sequence-sync"
    files:
      - "diagrams/PRD-01-diag_container_map.md"
      - "diagrams/PRD-01-diag_feature_data_flow.md"
      - "diagrams/PRD-01-diag_user_journey.md"
    rendered_svgs:
      - "diagrams/PRD-01-diag_container_map-1.svg"
      - "diagrams/PRD-01-diag_feature_data_flow-1.svg"
      - "diagrams/PRD-01-diag_user_journey-1.svg"

## Customer-Facing Content and Messaging
customer_facing_content:
  positioning: >
    TradeSpine is a MetaTrader 5 strategy framework for B3 futures traders who
    want strategy files to contain strategy logic while shared framework
    services handle safety, ownership, and audit evidence.
  key_messages:
    - "Write strategy logic once and route framework-mediated trades through shared safety gates."
    - "Run multiple same-symbol TradeSpine strategies with hedging ticket ownership evidence."
    - "Export paired trade intent and execution evidence for post-trade review."
  feature_descriptions:
    - name: "Strategy template"
      description: "A starting point for creating a B3 futures strategy that uses the framework authoring surface."
    - name: "Guarded execution"
      description: "A product path that checks risk, session, market, and broker readiness before framework-mediated trade submission."
    - name: "Audit exports"
      description: "Paired records that document trade intent and broker outcome for later analysis."
  documentation_requirements:
    - "P1 new strategy implementation guide covering file structure, lifecycle hooks, helper calls, common inputs, logging expectations, compile checklist, and reference-strategy walkthrough."
    - "Input reference for common risk, session, logging, and safety settings."
    - "Evidence guide that separates strategy/framework diagnostic logs from trade evaluation records."
    - "Testing guide for Tier-1 and release-gate validation."
    - "Release documentation inventory covering README, ARCHITECTURE, AUTHORING, RECIPES, INPUTS_REFERENCE, TESTING, per-module docs, template README, and CHANGELOG.md as the canonical decision log."
    - "Same-change documentation update gate and Doxygen/API documentation coverage gate if Doxygen remains part of the implementation standard."
  error_messages:
    - trigger: "Unsafe order request"
      message: "Trade rejected by TradeSpine safety gate."
      guidance: "Review lot, stop, session, and risk settings before retrying."
    - trigger: "Ambiguous strategy ownership"
      message: "Strategy halted until ownership state is resolved."
      guidance: "Review the halt report and broker state before restarting."
  success_messages:
    - trigger: "Strategy initialized"
      message: "TradeSpine strategy ready."
      channel: "Journal or chart status"
    - trigger: "Trade evidence written"
      message: "Trade evidence recorded."
      channel: "Journal or CSV audit output"

## Acceptance Criteria
acceptance_criteria:
  launch_gates:
    items:
      - category: Functional
        criterion: "All P1 product capabilities have downstream EARS-ready requirements."
        threshold: "100%"
        validation: "PRD audit and traceability review"
      - category: Safety
        criterion: "Framework-mediated catastrophic order scenarios are rejected before broker handoff."
        threshold: "Pass"
        validation: "Safety test suite"
      - category: Risk
        criterion: "Runtime risk controls cover daily loss %, max open lots, max trades per day, and strategy-scoped panic stop."
        threshold: "Pass"
        validation: "Risk-control test evidence and operator-input review"
      - category: Ownership
        criterion: "Same-symbol strategy ownership works on hedging accounts, and deferred account modes fail initialization before trading."
        threshold: "Pass"
        validation: "Automated hedging ownership tests plus deferred-mode init-failure evidence"
      - category: Session
        criterion: "Entries require both broker trading-session availability and the configured user trading-hours window in broker/server time."
        threshold: "Pass"
        validation: "Session test evidence"
      - category: Sizing
        criterion: "v1 validates symbol information at init and uses it for sizing, lot, and price-grid order definition."
        threshold: "Pass"
        validation: "Input reference and sizing test review"
      - category: Audit
        criterion: "Strategy/framework diagnostic logs are separated from paired trade intent and execution records."
        threshold: "Pass"
        validation: "Diagnostic log and trade evidence inspection"
      - category: Documentation
        criterion: "New strategy implementation guide and release-governance documentation set are complete for v1 strategy authors and release reviewers."
        threshold: "Pass"
        validation: "Documentation review, reference-strategy walkthrough, same-change docs check, and CHANGELOG review"
      - category: Performance
        criterion: "Matched tester overhead, memory, idle-tick, and low-I/O budgets stay within benchmark targets."
        threshold: "<=10% tester overhead; <=2 MB memory per EA; <=50 us idle tick; low-I/O write budgets pass"
        validation: "Minimum benchmark protocol and release checklist"
  business_acceptance:
    - "Strategy author can create a simple reference strategy or port an existing hedging strategy from the v1 implementation guide without duplicating broker execution infrastructure."
    - "Operator can identify why a framework-mediated trade was rejected or accepted."
    - "Analyst can evaluate trade records without parsing strategy/framework diagnostic logs."
    - "Release reviewer can trace every P1 product capability to BRD source elements."
  technical_acceptance:
    - "Strict compile passes for framework, simple reference samples, and additional hedging strategy ports."
    - "Tier-1 test suite passes before release sign-off."
    - "Repository checks detect prohibited direct broker submission in strategy files."

## Constraints and Assumptions
constraints_and_assumptions:
  constraints:
    - id: "PRD.01.12.e9ec"
      category: Technical
      description: "MetaTrader 5 and MQL5 are mandatory runtime and authoring targets."
      impact: "Non-MT5 runtimes and MQL4 compatibility are out of scope."
      brd_reference: "@brd: BRD.01.10.8d76"
    - id: "PRD.01.12.9a32"
      category: Product
      description: "v1 strategy instances attach to one chart symbol."
      impact: "Multi-symbol and portfolio behavior move to later cycles."
      brd_reference: "@brd: BRD.01.10.b11c"
    - id: "PRD.01.12.67aa"
      category: Release
      description: "v1 compile workflow uses MetaEditor."
      impact: "Headless compile automation is deferred unless later justified."
      brd_reference: "@brd: BRD.01.10.32c6"
    - id: "PRD.01.12.9a58"
      category: Product
      description: "B3 futures sizing modes are v1 scope; equity sizing modes are visible placeholders for v2."
      impact: "Equity sizing behavior must not be implemented or implied as production-ready in v1."
      brd_reference: "@brd: BRD.01.10.b11c"
  assumptions:
    - id: "PRD.01.12.68cf"
      assumption: "Broker metadata is sufficient for B3 futures operation."
      validation_method: "Validate symbol, session, and account-mode behavior during release testing."
      impact_if_false: "Block unsupported symbols or brokers."
      brd_reference: "@brd: BRD.01.10.88ee"
    - id: "PRD.01.12.f293"
      assumption: "The operator manages strategy parameters and risk limits per chart."
      validation_method: "Document inputs, default behavior, and runtime risk-control effects."
      impact_if_false: "Block release or create a risk-policy change request."
      brd_reference: "@brd: BRD.01.10.c6f8"

## Risk Assessment
risk_assessment:
  risks:
    - id: "PRD.01.13.093a"
      description: "Unsafe framework-mediated order reaches the broker."
      likelihood: Medium
      impact: High
      mitigation: "Require guarded helper routing, safety tests, and rejection evidence."
      owner: "Technical Lead"
      brd_reference: "@brd: BRD.01.12.5c81"
    - id: "PRD.01.13.e18a"
      description: "Deferred netting/exchange design is accidentally treated as v1 executable scope, or hedging ticket ownership drifts from broker state."
      likelihood: Medium
      impact: High
      mitigation: "Require explicit hedging ownership evidence, deferred-mode account tests, v2+ labeling for netting/exchange, and halt-on-ambiguity behavior."
      owner: "Technical Lead"
      brd_reference: "@brd: BRD.01.12.5985"
    - id: "PRD.01.13.9c2d"
      description: "Release sign-off may overstate v1 account-mode scope if deferred netting/exchange modes are not shown to fail safely."
      likelihood: Medium
      impact: High
      mitigation: "Require deferred-mode init-failure evidence in v1 and move manual concurrent netting evidence to v2+ executable netting scope."
      owner: "Technical Lead"
      brd_reference: "@brd: BRD.01.12.5985"
    - id: "PRD.01.13.f493"
      description: "Operator may run without intended daily loss, open lots, trade count, or panic controls."
      likelihood: Medium
      impact: High
      mitigation: "Expose runtime risk controls as P1 inputs and require risk-control test evidence before v1.0 sign-off."
      owner: "Product Owner"
      brd_reference: "@brd: BRD.01.12.5c81"
    - id: "PRD.01.13.3e77"
      description: "Product requirements drift from implementation during phased build."
      likelihood: Medium
      impact: Medium
      mitigation: "Use aidoc traceability, audits, and same-change documentation updates."
      owner: "Product Owner"
      brd_reference: "@brd: BRD.01.12.0224"
    - id: "PRD.01.13.be4b"
      description: "Framework overhead exceeds tester or idle-operation targets."
      likelihood: Medium
      impact: Medium
      mitigation: "Require benchmark evidence and low-I/O validation before v1.0 sign-off."
      owner: "Technical Lead"
      brd_reference: "@brd: BRD.01.07.bf02"
    - id: "PRD.01.13.edc4"
      description: "Release may diverge from canonical docs or changelog if same-change updates and decision records are not checked."
      likelihood: Medium
      impact: Medium
      mitigation: "Require same-change documentation updates, Doxygen/API documentation gate if retained, and CHANGELOG.md release-decision review."
      owner: "Product Owner"
      brd_reference: "@brd: BRD.01.12.0224"

