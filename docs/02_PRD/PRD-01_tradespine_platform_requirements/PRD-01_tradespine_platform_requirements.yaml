## Executive Summary
executive_summary:
  overview: >
    TradeSpine is a MetaTrader 5 product platform for B3 futures strategy
    authors. It gives the trader a single-file strategy authoring surface while
    product-level framework capabilities provide guarded trade execution,
    runtime risk controls, strategy-scoped account-mode ownership, audit
    evidence, and release validation.
  mvp_hypothesis:
    statement: "We believe that the owner-operator trader will create safer B3 futures strategies if TradeSpine separates strategy logic from reusable trading infrastructure."
    validation: "We will know this is true when two simple reference samples and two additional hedging strategy ports compile, trade through framework helpers, and satisfy the v1.0 launch gates."
  timeline:
    - phase: "Foundation"
      dates: "v0.1 to v0.3"
      duration: "Phased build"
    - phase: "Strategy lifecycle"
      dates: "v0.4 to v0.6"
      duration: "Phased build"
    - phase: "Netting and reference delivery"
      dates: "v0.7 to v0.9"
      duration: "Phased build"
    - phase: "MVP Launch"
      dates: "v1.0"
      duration: "Release gate"

## Problem Statement
problem_statement:
  current_state:
    - "Strategy files repeat execution, session, state, risk, logging, and recovery infrastructure."
    - "Duplicated infrastructure increases real-money defect exposure when each EA re-solves broker and account-mode behavior."
    - "The current monolithic reference strategy contains roughly 70% reusable infrastructure."
  business_impact:
    revenue: "Not estimated in source brief"
    customer_satisfaction: "Owner-operator velocity and confidence are reduced by repeated infrastructure work."
    competitive: "The framework must keep authoring speed without reducing trading safety."
  opportunity: >
    TradeSpine can turn repeated EA infrastructure into a reusable product
    surface with auditable safety gates and reference strategy workflows.

## Target Audience and User Personas
target_audience:
  primary_persona:
    name: "Owner-Operator Trader"
    role: "MQL5 strategy author and live operator"
    key_characteristic: "Builds and operates B3 futures strategies in MT5."
    main_pain_point: "Each strategy requires repeated broker, risk, state, and audit infrastructure."
    success_criteria: "Can write a new strategy as one strategy file and rely on framework safety and evidence capabilities."
    usage_frequency: "Every strategy build, backtest, optimization, and live deployment cycle."
  secondary_personas:
    - name: "Future MQL5 Developer"
      role: "Strategy contributor"
    - name: "Post-Trade Analyst"
      role: "Python analytics consumer"

