      measurement: "Documentation review plus reference-strategy walkthrough"
      brd_reference: "@brd: BRD.01.07.88a6"
    - id: "PRD.01.05.5be3"
      metric: "Tester overhead"
      baseline: "Hand-written equivalent strategy"
      target: "<=10% median overhead"
      measurement: "Minimum benchmark protocol"
      brd_reference: "@brd: BRD.01.07.bf02"
    - id: "PRD.01.05.9ccc"
      metric: "Performance budget coverage"
      baseline: "Only tester overhead is tracked"
      target: "Release evidence covers tester overhead <=10%, memory <=2 MB per EA, idle tick <=50 us, and low-I/O write budgets"
