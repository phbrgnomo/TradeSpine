implementation_contracts:
  provided:
    contracts:
      - name: "Scenario harness contract"
        type: "DI Interface"
        files: ["Scripts/Tests/Test_TestSupportScenarioHarness.mq5", "Scripts/Tests/Support/FakeClock.mqh", "Scripts/Tests/Support/FakeTradePort.mqh", "Scripts/Tests/Support/ScenarioHarness.mqh"]
        summary: "Executable harness tests assemble components with deterministic broker, clock, store, symbol, log, and evidence seams."
      - name: "Release evidence contract"
        type: "Data Model"
        files: ["Scripts/Tests/Test_ReleaseEvidenceHarness.mq5", "Include/Testing/Assert.mqh"]
        summary: "Manual deferred account-mode evidence remains separate from automated Strategy Tester evidence."
      - name: "RunAll aggregate contract"
        type: "Test Runner"
        files: ["Scripts/Tests/RunAllTests.mq5", "Scripts/Tests/Test_TestSupportClock.mq5", "Scripts/Tests/Test_TestSupportTradePort.mq5", "Scripts/Tests/Test_TestSupportScenarioHarness.mq5", "Scripts/Tests/Test_ReleaseEvidenceHarness.mq5"]
        summary: "RunAllTests includes each executable TDD-11 test script and calls all mapped test functions."
  consumed:
    dependencies:
      - "@iplan: IPLAN-09 (IClock, ILogSink, RuntimeMode, ProfileSample, BenchmarkBaseline)"
      - "@iplan: IPLAN-03 (ITradePort, GuardResult, TradeIntent)"
      - "@iplan: IPLAN-04 (IPositionView and account/position context contracts)"
      - "@iplan: IPLAN-05 (IStateStore and persistence/evidence contracts)"

