execution_commands:
  cwd: "MQL5/Experts/Main/TradeSpine"
  setup:
    - "mkdir -p Include/Testing Scripts/Tests/Support"
  implementation:
    - "# Interface ownership: IPLAN-09 provides IClock/ILogSink/runtime; IPLAN-03 provides ITradePort/GuardResult/TradeIntent; IPLAN-04 provides IPositionView; IPLAN-05 provides IStateStore."
    - "# Write executable .mq5 test entry points first, then support includes, assertion/mock helpers, and the RunAllTests aggregate runner."
    - "# Keep test support outside production execution paths and use the same interfaces consumed by production components."
  validation:
    - "bash ../../../Scripts/compile_mql.sh Scripts/Tests/Test_TestSupportClock.mq5"
    - "bash ../../../Scripts/compile_mql.sh Scripts/Tests/Test_TestSupportTradePort.mq5"
