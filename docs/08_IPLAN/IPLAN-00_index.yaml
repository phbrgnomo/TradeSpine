documentation_closeout:
  _guidance: |
    Final plan step after component implementation. This is intentionally not a
    permanent IPLAN because SPEC-08 is process/governance scope and has no
    Layer 7 code TDD. It closes the release documentation obligations after the
    implemented source tree is available.
  status: "NOT_STARTED"
  sequence_after_tier: 8
  source_refs:
    - "@spec: SPEC-08"
    - "@prd: PRD.01.09.5ef1"
    - "@prd: PRD.01.09.eaf3"
    - "@prd: PRD.01.14.8720"
  deliverables:
    - path: "Docs/README.md"
      purpose: "Project orientation, supported v1 scope, and repository layout."
    - path: "Docs/ARCHITECTURE.md"
      purpose: "Codebase reference documentation for component boundaries, dependency direction, and execution flow."
    - path: "Docs/MODULES/*.md"
      purpose: "Per-module reference pages for Core, Market, Position, Persistence, Coordination, Execution, Risk, Indicators, Strategy, Optional, and Testing."
    - path: "Docs/AUTHORING.md"
      purpose: "New strategy creation guide with lifecycle hooks, helper calls, common inputs, logging expectations, and compile checklist."
    - path: "Docs/RECIPES.md"
      purpose: "Strategy author recipes, layered exits, trailing behavior, and B3-specific examples."
    - path: "Docs/INPUTS_REFERENCE.md"
      purpose: "Canonical common input groups, names, defaults, and operator notes."
    - path: "Docs/TESTING.md"
      purpose: "Tier-1, Tier-1.5, Tier-2, deferred account-mode evidence, and release evidence procedures."
    - path: "Experts/_Template/README.md"
      purpose: "Template-specific quick start for creating one-file strategies."
  file_manifest:
    files:
      - path: "Docs/README.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/ARCHITECTURE.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Core.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Market.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Position.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Persistence.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Coordination.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Execution.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Risk.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Indicators.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Strategy.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Optional.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/MODULES/Testing.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/AUTHORING.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/RECIPES.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/INPUTS_REFERENCE.md"
        status: NOT_STARTED
        verified: false
      - path: "Docs/TESTING.md"
        status: NOT_STARTED
        verified: false
      - path: "Experts/_Template/README.md"
        status: NOT_STARTED
        verified: false
  execution_commands:
    cwd: "MQL5/Experts/Main/TradeSpine"
    setup:
      - "mkdir -p Docs/MODULES Experts/_Template"
    implementation:
      - "# Write documentation only after IPLAN-12 and IPLAN-13 complete so docs reflect the implemented framework and shipped strategy ports."
      - "# Use implemented public interfaces and file paths, not planned placeholders."
    validation:
      - "test -f Docs/README.md"
      - "test -f Docs/ARCHITECTURE.md"
      - "test -f Docs/AUTHORING.md"
      - "test -f Docs/TESTING.md"
      - "test -f Experts/_Template/README.md"
      - "rg -n \"1minscalpv3_hedging|BullishBearish Engulfing all v7 hedging|DonchianBreakout|MovingAverageCross\" Docs Experts/_Template/README.md"
      - "! rg -n \"planned placeholder|TODO implementation|no EARS IDs exist yet|approved for ADR generation\" Docs Experts/_Template/README.md"
  acceptance_checks:
    - "Documentation references implemented file paths and public interfaces, not planned placeholders."
    - "AUTHORING walks through creating a new strategy from the template through compile and first test."
    - "ARCHITECTURE and MODULES document the codebase after implementation, including dependencies and no-bypass boundaries."
    - "TESTING documents how to run each declared script and how to collect release evidence."
    - "Docs use the TradeSpine root MQL5/Experts/Main/TradeSpine/ and quoted relative include examples."
  status_history:
    - from: "UNTRACKED"
      to: "NOT_STARTED"
      date: "2026-06-03"
      reason: "Final documentation closeout added after component implementation."

cross_plan_obligations:
  _guidance: "Shared implementation conventions introduced before source work starts."
  obligations:
    - id: "CPO-001"
      description: "All framework code stays under MQL5/Experts/Main/TradeSpine with quoted relative includes; strategy files must not include terminal-global Trade or Expert headers."
      introduced_by: "IPLAN-09"
      adopted_date: "2026-06-03"
    - id: "CPO-002"
      description: "Every plan writes tests before implementation and leaves file_manifest status untouched until a coding session starts."
      introduced_by: "IPLAN-11"
      adopted_date: "2026-06-03"
    - id: "CPO-003"
      description: "Code inventory entries are added only by implementation sessions after files are actually created or modified."
      introduced_by: "IPLAN-00"
      adopted_date: "2026-06-03"
    - id: "CPO-004"
      description: "After source implementation, run documentation closeout for codebase reference documentation and the new strategy creation guide."
      introduced_by: "IPLAN-00"
      adopted_date: "2026-06-03"
    - id: "CPO-005"
      description: "Run aidoc-flow commands from MQL5/Experts/Main/TradeSpine so the authoritative TradeSpine .aidoc/profile.yaml governs docs generation and review."
      introduced_by: "IPLAN-00"
      adopted_date: "2026-06-03"

deferred_items:
  _guidance: "Cross-plan scope deferrals."
  items:
