update_triggers:
  _guidance: "When to update this registry."
  on_plan_created:
    - "Add entry to registry.plans."
    - "Increment metadata.total_plans."
    - "Update execution_path.tiers if ordering changes."
  on_status_change:
    - "Update plan status and status_date in registry.plans."
    - "Append to status_history."
  on_plan_completed:
    - "Set status: Completed with date."
    - "Update files_done and sessions_completed."
  on_plan_abandoned:
    - "Set status: ABANDONED with date."
    - "File preserved; plan number never reused."
  on_item_deferred:
    - "Add to deferred_items and the plan skipped list."
  on_cross_plan_obligation_added:
    - "Append to cross_plan_obligations.obligations."
