## Section 2: Context
context:
  problem_statement: "TradeSpine must execute inside MT5 while allowing Python/SQLite analytics outside the MQL5 runtime without introducing tester-hostile APIs."
  business_driver: "The trader needs reliable broker execution and later post-trade analysis, but not synchronous external API calls from live EAs."
  key_constraints:
    - "MT5/MQL5 is the execution and tester environment."
    - "Python analytics lives outside the MQL5 tree."
    - "WebRequest and external APIs are deferred beyond v1."
  technical_context: "BDD.01.03.d6ae validates evidence records for analysis, and BDD.01.03.b37d validates low-overhead performance budgets."

## Section 3: Decision
decision:
  chosen_solution:
    id: "ADR.03.03.4124"
    title: "Keep execution in MT5 and export evidence for offline analytics"
    description: "TradeSpine will use MT5 broker APIs for execution and write local evidence artifacts for later Python analysis. v1 will not call external services from the EA runtime."
  key_components:
    - name: "MT5 terminal"
      role: "Execution, tester, broker metadata, and trade lifecycle host."
    - name: "Evidence files"
      role: "Local interface between EA runtime and external analytics."
    - name: "Python analytics repository"
      role: "Out-of-process post-trade analysis consumer."
  implementation_approach:
    mvp_scope: "File-based evidence handoff and terminal journal diagnostics."
    next_cycle_scope: "External API integration only after v1 tester compatibility and performance are proven."

## Section 4: Alternatives Considered
alternatives:
  options:
    - id: "ADR.03.04.88b1"
      name: "File-based analytics handoff"
      selected: true
      description: "Write evidence locally and process it outside MT5."
      pros: ["Tester compatible", "Low operational complexity", "No live trading dependency on network calls"]
      cons: ["Analytics is asynchronous and post-hoc"]
      estimated_cost: "Low"
      fit: Best
    - id: "ADR.03.04.d3d6"
      name: "Direct WebRequest analytics"
      selected: false
      description: "Send trade events from the EA to an external API."
      pros: ["Near-real-time analytics possible"]
      cons: ["Synchronous calls can block EAs", "Tester-hostile", "Requires permissions and endpoint operations"]
      rejection_reason: "Out of v1 scope and conflicts with reliability/performance goals."
      estimated_cost: "High"
      fit: Poor
    - id: "ADR.03.04.1509"
      name: "Manual terminal export only"
      selected: false
      description: "Depend on tester reports and manual exports."
      pros: ["Minimal implementation"]
      cons: ["Cannot guarantee paired intent/execution evidence", "Poor reproducibility"]
      rejection_reason: "Does not satisfy audit evidence requirements."
      estimated_cost: "Low"
      fit: Poor

## Section 5: Consequences
consequences:
  positive_outcomes:
    - id: "ADR.03.05.b78d"
      outcome: "Live trading behavior does not depend on external analytics availability."
  tradeoffs_and_risks:
    - id: "ADR.03.05.9388"
      tradeoff: "Analytics is delayed until evidence files are processed."
      impact: Low
      mitigation: "Use consistent daily file naming and append-only records for ingestion."
  cost_estimate:
    mvp_cost: "Low"
    ongoing_monthly: "None"
    notes: "External analytics infrastructure is outside v1."

## Section 6: Architecture Flow
architecture_flow:
  decision_sequence:
    intent:
      diagram_type: sequence
      scope_boundary: "MT5 execution to offline analytics"
      upstream_refs: "PRD.01.14.de0d; BDD.01.03.d6ae"
      downstream_refs: "SPEC evidence writer and analytics boundary"
    tag: "@diagram: sequence-sync"
    diagram:
      type: sequenceDiagram
      content: |
        sequenceDiagram
          participant EA as TradeSpine EA
          participant Broker as MT5 Broker API
          participant Files as MQL5 Files
          participant Python as Python Analytics
          EA->>Broker: Execute framework-mediated request
          Broker-->>EA: Return trade outcome
          EA->>Files: Append evidence records
          Python->>Files: Read evidence after run/session
  integration_points:
    - system: "MT5 broker API"
      integration_type: "terminal API"
      purpose: "Authoritative execution and broker metadata boundary."
    - system: "Python analytics"
      integration_type: "file handoff"
      purpose: "Post-trade evaluation outside the EA runtime."

## Section 7: Implementation Assessment
implementation_assessment:
  mvp_phases:
    - phase: "Evidence handoff"
      scope: "Write intent/execution CSV files and document Python-side consumption boundary."
      risk: "File schema changes can break analytics ingestion."
  rollback_plan:
    strategy: "Keep MT5 evidence files as the stable contract and revise Python consumers."
    trigger: "Analytics consumer cannot parse release evidence."
    estimated_effort: "Low to Medium"
  monitoring_baseline:
