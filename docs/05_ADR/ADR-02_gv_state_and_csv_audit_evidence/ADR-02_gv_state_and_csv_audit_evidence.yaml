## Section 2: Context
context:
  problem_statement: "TradeSpine must preserve strategy-scoped ownership and post-trade evidence without adding high-I/O live-market durability mechanisms in v1."
  business_driver: "Operators need recoverable state and analysts need paired trade records, but performance targets forbid heavy idle-tick work."
  key_constraints:
    - "v1 state persistence is terminal Global Variable backed."
    - "CSV trade evidence is written through TradeLogger under the MQL5 Files sandbox."
    - "Ambiguous recovery must enter HALT rather than infer ownership."
  technical_context: "BDD.01.03.0073 covers paired intent/execution evidence, BDD.01.03.d6ae covers separated logs and trade records, and BDD.01.03.e16a covers HALT-on-ambiguity."

## Section 3: Decision
decision:
  chosen_solution:
    id: "ADR.02.03.c7dd"
    title: "Use terminal GV state plus paired CSV audit evidence"
    description: "v1 stores scalar strategy lifecycle state, duplicate markers, hedging ticket ownership state, HALT/recovery markers, and deferred-mode diagnostics in terminal Global Variables, while TradeLogger writes paired intent and execution CSV records for trade evaluation. Execution mutex fields, pending-exit queues, virtual-ledger fields, and executable netting/exchange ownership are v2+ scope. No custom file snapshot layer ships in v1."
  key_components:
    - name: "CStateStore"
      role: "Owns GV-backed strategy state and recovery evidence."
    - name: "TradeLogger"
      role: "Writes paired CSV intent and execution evidence."
    - name: "HALT state"
      role: "Stops non-emergency behavior when recovery evidence is ambiguous."
  implementation_approach:
    mvp_scope: "GV scalar state, hedging ticket state, duplicate markers, deferred-mode diagnostics, magic-filtered broker history reconciliation, paired CSV records, and HALT on ambiguity."
    next_cycle_scope: "Execution mutex, pending-exit queues, virtual-ledger fields, executable netting/exchange ownership, optional file snapshot, or forced flush durability only if post-v1 evidence justifies extra I/O."

## Section 4: Alternatives Considered
alternatives:
  options:
    - id: "ADR.02.04.584c"
      name: "GV state plus paired CSV evidence"
      selected: true
      description: "Use terminal-managed Global Variables for state and CSV files for evidence."
      pros: ["Low idle-path I/O", "Works inside MT5 tester/live constraints", "Matches PRD recovery posture"]
      cons: ["GV loss can force HALT instead of automatic recovery"]
      estimated_cost: "Medium"
      fit: Best
    - id: "ADR.02.04.dd1d"
      name: "Custom file snapshot state"
      selected: false
      description: "Persist full state snapshots to project files."
      pros: ["Potentially stronger crash recovery"]
      cons: ["More file I/O", "More schema/versioning work", "Tester contamination risk"]
      rejection_reason: "Conflicts with v1 low-I/O targets until evidence proves need."
      estimated_cost: "High"
      fit: Good
    - id: "ADR.02.04.f17e"
      name: "In-memory state only"
      selected: false
      description: "Use runtime flags and broker state without durable local state."
      pros: ["Lowest implementation complexity"]
      cons: ["Cannot preserve v2+ virtual netting ownership across restart"]
      rejection_reason: "Unsafe for HALT recovery and future netting requirements."
      estimated_cost: "Low"
      fit: Poor

## Section 5: Consequences
consequences:
  positive_outcomes:
    - id: "ADR.02.05.dc3c"
      outcome: "State recovery and audit evidence are separated but correlated by strategy-run and order-intent identifiers."
  tradeoffs_and_risks:
    - id: "ADR.02.05.ec17"
      tradeoff: "GV state can be insufficient after crash or manual intervention."
      impact: High
      mitigation: "Enter HALT and preserve last-known state instead of guessing ownership."
  cost_estimate:
    mvp_cost: "Medium"
    ongoing_monthly: "None"
    notes: "Cost is state schema, reconciliation, and evidence formatting."

