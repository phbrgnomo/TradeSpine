## Section 6: Architecture Flow
architecture_flow:
  decision_sequence:
    intent:
      diagram_type: sequence
      scope_boundary: "Framework-mediated trade safety"
      upstream_refs: "PRD.01.14.8720; BDD.01.03.9a8b"
      downstream_refs: "SPEC guarded trade and repository policy checks"
    tag: "@diagram: sequence-error"
    diagram:
      type: sequenceDiagram
      content: |
        sequenceDiagram
          participant Strategy
          participant Coordinator as CTradeCoordinator
          participant Guard as CGuardedTrade
          participant Broker
          Strategy->>Coordinator: OpenLong/OpenShort/Close helper
          Coordinator->>Guard: Submit TradeIntent
          Guard->>Guard: Apply TradeIntent consistency, catastrophic, session, OrderCheck, and margin gates
          alt gates pass
            Guard->>Broker: Submit via private CTrade
          else gates fail
            Guard-->>Coordinator: Reject with reason
          end
  integration_points:
    - system: "MT5 broker boundary"
      integration_type: "private CTrade composition"
      purpose: "Only reached after guarded checks pass."

