## Section 2: Context
context:
  problem_statement: "TradeSpine must prevent catastrophic framework-mediated orders while acknowledging that MQL5 cannot technically prevent a strategy author from writing raw OrderSend code outside the framework."
  business_driver: "Real-money operation requires unsafe helper-driven order paths to stop before broker handoff and direct broker bypasses to fail release governance."
  key_constraints:
    - "All supported strategy entry/exit helpers route through CTradeCoordinator and CGuardedTrade."
    - "Language-level bypass remains possible and is controlled by repository policy and release checks."
    - "Runtime risk controls and panic stop are strategy-scoped in v1."
  technical_context: "BDD.01.03.9a8b validates unsafe order rejection, BDD.01.03.0ad7 validates strategy-scoped panic, and BDD.01.03.ef54 validates broker-bypass release evidence."

## Section 3: Decision
decision:
  chosen_solution:
    id: "ADR.04.03.7277"
    title: "Use a single guarded trade path plus repository bypass checks"
    description: "TradeSpine will enforce safety inside the supported helper path through a separate CRiskManager for runtime risk controls, CGuardedTrade for per-order consistency/catastrophic checks, OrderCheck, margin checks, and HALT behavior, while release governance rejects strategy files that include raw broker execution bypasses."
  key_components:
    - name: "CTradeCoordinator"
      role: "Builds the framework-mediated intent and routes order requests."
    - name: "CGuardedTrade"
      role: "Composes the private vendored CTrade and applies per-order TradeIntent consistency checks, catastrophic caps, broker preflight, and fill/retcode handling before broker submission."
    - name: "CRiskManager"
      role: "Owns strategy-scoped daily-loss, max-open-lots, max-trades-per-day, and panic-stop evaluation separately from per-order guarded execution."
    - name: "Repository bypass check"
      role: "Detects raw OrderSend and prohibited terminal trade includes in strategy files."
  implementation_approach:
    mvp_scope: "Guarded helper path, separate CRiskManager runtime controls, direct-broker bypass grep checks, and rejection evidence."
    next_cycle_scope: "System-wide panic can be evaluated after v1 strategy-scoped controls are proven."

## Section 4: Alternatives Considered
alternatives:
  options:
    - id: "ADR.04.04.5842"
      name: "Guarded helper path plus release bypass checks"
      selected: true
      description: "Enforce safety on framework-mediated requests and fail release if strategy code bypasses the framework."
      pros: ["Prevents unsafe supported-path broker handoff", "Honest about MQL5 language limits", "Testable with mocks and grep checks"]
      cons: ["Cannot prevent malicious raw MQL5 code outside release policy"]
      estimated_cost: "Medium"
      fit: Best
    - id: "ADR.04.04.89e1"
      name: "Guard-only enforcement"
      selected: false
      description: "Only implement CGuardedTrade and do not enforce repository bypass checks."
      pros: ["Simpler release process"]
      cons: ["A strategy can bypass the safe path unnoticed"]
      rejection_reason: "Fails the real-money governance requirement."
      estimated_cost: "Low"
      fit: Poor
    - id: "ADR.04.04.dc1a"
      name: "Account-wide terminal panic and lock"
      selected: false
      description: "Try to enforce global account-wide safety from v1."
      pros: ["Broader operator control"]
      cons: ["Can affect unrelated strategies", "Requires cross-EA coordination beyond v1"]
      rejection_reason: "Overreaches the v1 strategy-scoped safety boundary."
      estimated_cost: "High"
      fit: Good

## Section 5: Consequences
consequences:
