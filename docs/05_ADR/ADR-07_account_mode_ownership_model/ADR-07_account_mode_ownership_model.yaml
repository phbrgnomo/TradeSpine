## Section 2: Context
context:
  problem_statement: "TradeSpine must let multiple strategies run on the same symbol in netting, exchange-netting, and hedging accounts without strategy code knowing the broker account mode."
  business_driver: "The owner-operator needs one strategy authoring model that preserves per-strategy ownership evidence across B3 futures brokers and account modes."
  key_constraints:
    - "Hedging accounts can use broker-native tickets as the primary ownership surface."
    - "Netting and exchange-netting accounts expose one aggregate broker position per symbol, so broker aggregate state cannot identify one strategy's virtual exposure."
    - "Exclusive one-EA-per-symbol locking on netting is rejected by the source PRD because it would reduce netting accounts below hedging usefulness."
  technical_context: "PRD.md G-4a and F-POS-1/F-POS-16/F-POS-19 define the adapter boundary, virtual gross-position ledger, and strategy-owned pending exits. BDD.01.03.8180 and BDD.01.03.f11f validate account-mode ownership evidence."

## Section 3: Decision
decision:
  chosen_solution:
    id: "ADR.07.03.6df1"
    title: "Use account-mode adapters with strategy-scoped ownership evidence"
    description: "TradeSpine will keep strategy code mode-agnostic above IAccountModeAdapter. Hedging ownership is broker-native through magic-filtered tickets and orders. Netting and exchange-netting ownership is framework-native through a per-EA virtual gross-position ledger plus linked strategy-owned pending SL/TP exit orders."
  key_components:
    - name: "IAccountModeAdapter"
      role: "Defines the mode-agnostic ownership and operation contract used by the coordinator and strategy base."
    - name: "CHedgingAdapter"
      role: "Maps ownership to broker tickets and per-ticket operations."
    - name: "CNettingAdapter"
      role: "Maps ownership to virtual ledger state and strategy-owned pending exits while broker exposure remains aggregate."
  implementation_approach:
    mvp_scope: "Support RETAIL_HEDGING, RETAIL_NETTING, and EXCHANGE with independent per-strategy ownership and manual live/demo evidence for true concurrent same-symbol netting."
    next_cycle_scope: "Pyramiding, portfolio-level allocation, and system-wide panic may extend the same adapter boundary in later versions."

## Section 4: Alternatives Considered
alternatives:
  options:
    - id: "ADR.07.04.38a9"
      name: "Adapter with virtual netting ledger"
      selected: true
      description: "Use mode-specific adapters and virtual ownership for netting while preserving one strategy-facing API."
      pros: ["Preserves multiple same-symbol strategies", "Keeps strategy code mode-agnostic", "Matches MT5 netting and hedging semantics"]
      cons: ["Requires virtual ledger, pending-exit ownership, and manual netting evidence"]
      estimated_cost: "High"
      fit: Best
    - id: "ADR.07.04.9c21"
      name: "One EA per symbol on netting"
      selected: false
      description: "Block multiple same-symbol EAs when the account is netting."
      pros: ["Simpler implementation"]
      cons: ["Rejects a source PRD goal", "Creates mode-dependent strategy usefulness"]
      rejection_reason: "Fails G-4a and the multiple-strategies-per-symbol acceptance path."
      estimated_cost: "Low"
      fit: Poor
    - id: "ADR.07.04.c0b3"
      name: "Use broker aggregate position as shared state"
      selected: false
      description: "Infer strategy state from PositionSelect(symbol) and aggregate position properties."
      pros: ["Minimal persistence model"]
      cons: ["Cannot distinguish opposing virtual strategies", "Manual or external orders corrupt strategy state"]
      rejection_reason: "Unsafe for netting and explicitly disallowed by PRD.md F-POS-15/F-POS-18."
      estimated_cost: "Medium"
      fit: Poor

## Section 5: Consequences
consequences:
  positive_outcomes:
    - id: "ADR.07.05.d2e4"
      outcome: "Strategy code can use the same helpers and queries on hedging, netting, and exchange-netting accounts."
    - id: "ADR.07.05.4a6b"
      outcome: "Netting broker-flat states can coexist with active opposing virtual positions without corrupting either strategy."
  tradeoffs_and_risks:
    - id: "ADR.07.05.61fb"
      tradeoff: "True concurrent same-symbol netting contention cannot be fully automated in Strategy Tester."
      impact: High
      mitigation: "Keep the manual live/demo evidence pack as a release gate and cover deterministic ledger behavior with Tier-1.5 scripts."
    - id: "ADR.07.05.8aa7"
      tradeoff: "Netting pending exits have residual offline OCO risk."
      impact: High
      mitigation: "Reconcile strategy-owned pending exits on restart and enter HALT when sibling relationships are ambiguous."
  cost_estimate:
    mvp_cost: "High"
    ongoing_monthly: "Low"
    notes: "Cost is concentrated in adapter tests, ledger reconciliation, and manual evidence collection."

## Section 6: Architecture Flow
architecture_flow:
  decision_sequence:
    intent:
      diagram_type: sequence
      scope_boundary: "Account-mode ownership"
      upstream_refs: "PRD.01.09.5cce; BDD.01.03.8180; BDD.01.03.f11f"
      downstream_refs: "SPEC account-mode adapter and virtual ledger contracts"
    tag: "@diagram: sequence-ownership"
    diagram:
      type: sequenceDiagram
      content: |
        sequenceDiagram
          participant Strategy
          participant Coord as CTradeCoordinator
          participant Pos as CPositionContext
          participant Adapter as IAccountModeAdapter
          participant Broker
          Strategy->>Coord: CloseAll/TrailSL/HasMyPosition
          Coord->>Pos: Request strategy-scoped operation
          Pos->>Adapter: Delegate by ACCOUNT_MARGIN_MODE
          alt hedging
            Adapter->>Broker: Operate on magic-filtered tickets
          else netting or exchange
            Adapter->>Adapter: Update virtual ledger and linked pending exits
            Adapter->>Broker: Submit aggregate-effect deal/order
          end
  integration_points:
    - system: "MT5 account mode"
      integration_type: "adapter selection"
      purpose: "Select hedging or netting ownership mechanism at init."
    - system: "MT5 broker order book"
      integration_type: "ticket/order evidence"
      purpose: "Carry magic-filtered ownership evidence where broker surfaces allow it."

## Section 7: Implementation Assessment
implementation_assessment:
  mvp_phases:
    - phase: "Hedging adapter"
      scope: "Ticket filtering, close, partial close, modify, and trailing behavior."
      risk: "Incorrect magic/symbol filtering touches another strategy."
    - phase: "Netting adapter"
      scope: "Virtual ledger, pending exits, execution mutex, OCO recovery, and manual evidence pack."
      risk: "Broker aggregate exposure is mistaken for per-strategy state."
  rollback_plan:
    strategy: "Block v1 sign-off for affected account modes until adapter evidence passes."
    trigger: "Any test or manual evidence showing cross-strategy ownership leakage."
    estimated_effort: "High"
  monitoring_baseline:
    - metric: "Cross-strategy ownership leak"
      target: "0"
      alert_threshold: "Any occurrence"

