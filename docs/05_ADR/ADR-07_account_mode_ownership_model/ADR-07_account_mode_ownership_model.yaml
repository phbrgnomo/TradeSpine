## Section 2: Context
context:
  problem_statement: "TradeSpine must let multiple strategies run on the same symbol in v1 without forcing the risky netting virtual-ledger model into the first release."
  business_driver: "The owner-operator needs a v1 implementation path that is safe to build and validate on hedging accounts while preserving a clean adapter boundary for future netting/exchange support."
  key_constraints:
    - "Hedging accounts can use broker-native tickets as the primary ownership surface."
    - "Netting and exchange-netting accounts expose one aggregate broker position per symbol, so broker aggregate state cannot identify one strategy's virtual exposure."
    - "v1 must fail safely before trading when RETAIL_NETTING or EXCHANGE is selected or detected."
    - "Virtual gross-position ledger, pending-exit/OCO behavior, execution mutex, and manual concurrent netting evidence are deferred to v2+."
  technical_context: "PRD.md G-4a and F-POS-1/F-POS-16/F-POS-19 define the adapter boundary and now mark netting/exchange execution as v2+ deferred. BDD.01.03.8180 and BDD.01.03.f11f validate hedging ownership and deferred-mode init failure."

## Section 3: Decision
decision:
  chosen_solution:
    id: "ADR.07.03.6df1"
    title: "Use account-mode adapters with hedging-first v1 execution"
    description: "TradeSpine will keep strategy code mode-agnostic above IAccountModeAdapter. v1 activates CHedgingAdapter only: ownership is broker-native through magic-filtered tickets and orders. Netting and exchange-netting are selectable/detectable but fail initialization with a deferred-mode diagnostic before any trade path, virtual ledger, pending-exit tracker, or execution mutex becomes active."
  key_components:
    - name: "IAccountModeAdapter"
      role: "Defines the mode-agnostic ownership and operation contract used by the coordinator and strategy base."
    - name: "CHedgingAdapter"
      role: "Maps ownership to broker tickets and per-ticket operations."
    - name: "CNettingAdapter"
      role: "Deferred v2+ adapter placeholder/design scope for virtual ledger state and strategy-owned pending exits while broker exposure remains aggregate."
  implementation_approach:
    mvp_scope: "Support RETAIL_HEDGING execution with independent per-strategy ticket ownership. RETAIL_NETTING and EXCHANGE fail initialization with deferred-mode diagnostics and no side effects."
    next_cycle_scope: "Executable netting/exchange adapters, virtual ledger, pending exits/OCO, execution mutex, manual concurrent netting evidence, pyramiding, portfolio-level allocation, and system-wide panic may extend the same adapter boundary in later versions."

## Section 4: Alternatives Considered
alternatives:
  options:
    - id: "ADR.07.04.38a9"
      name: "Hedging-first adapter boundary with deferred netting"
      selected: true
      description: "Use the account-mode adapter boundary, execute hedging in v1, and fail netting/exchange initialization until v2+ implements virtual ownership."
      pros: ["Preserves strategy-facing API", "Keeps v1 implementation smaller and safer", "Prevents incomplete netting logic from trading real money"]
      cons: ["Does not execute on netting/exchange accounts in v1", "Requires explicit deferred-mode documentation and tests"]
      estimated_cost: "Medium"
      fit: Best
    - id: "ADR.07.04.7b7e"
      name: "Implement virtual netting ledger in v1"
      selected: false
      description: "Use mode-specific adapters and virtual ownership for netting while preserving one strategy-facing API."
      pros: ["Would preserve multiple same-symbol strategies across account modes in v1"]
      cons: ["Requires virtual ledger, pending-exit ownership, execution mutex, and manual netting evidence before the first release"]
      rejection_reason: "Too much architectural risk for v1; moved to v2+ by PRD v3.74."
      estimated_cost: "High"
      fit: Deferred
    - id: "ADR.07.04.9c21"
      name: "One EA per symbol on netting"
      selected: false
      description: "Block multiple same-symbol EAs when the account is netting."
      pros: ["Simpler implementation"]
      cons: ["Rejects a source PRD goal", "Creates mode-dependent strategy usefulness"]
      rejection_reason: "Fails G-4a and the multiple-strategies-per-symbol acceptance path."
      estimated_cost: "Low"
      fit: Poor
    - id: "ADR.07.04.c0b3"
      name: "Use broker aggregate position as shared state"
      selected: false
      description: "Infer strategy state from PositionSelect(symbol) and aggregate position properties."
      pros: ["Minimal persistence model"]
      cons: ["Cannot distinguish opposing virtual strategies", "Manual or external orders corrupt strategy state"]
      rejection_reason: "Unsafe for netting and explicitly disallowed by PRD.md F-POS-15/F-POS-18."
      estimated_cost: "Medium"
      fit: Poor

## Section 5: Consequences
consequences:
  positive_outcomes:
    - id: "ADR.07.05.d2e4"
      outcome: "Strategy code can use the same helpers and queries on hedging accounts while the adapter boundary remains ready for v2 netting/exchange support."
    - id: "ADR.07.05.4a6b"
      outcome: "Unsupported v1 account modes fail before trading, preventing incomplete virtual-ledger behavior from affecting live accounts."
  tradeoffs_and_risks:
    - id: "ADR.07.05.61fb"
      tradeoff: "v1 cannot execute on netting or exchange-netting accounts."
      impact: High
      mitigation: "Fail initialization with an explicit deferred-mode diagnostic and document netting/exchange as v2+ scope."
    - id: "ADR.07.05.8aa7"
      tradeoff: "v2 netting pending exits will still have residual offline OCO risk when implemented."
      impact: High
      mitigation: "Keep pending-exit/OCO rules as v2 design context and require a future ADR/spec update before executable support."
  cost_estimate:
    mvp_cost: "Medium"
    ongoing_monthly: "Low"
    notes: "v1 cost is concentrated in hedging ownership tests and deferred-mode failure evidence; virtual ledger and manual netting evidence move to v2+."

## Section 6: Architecture Flow
architecture_flow:
  decision_sequence:
    intent:
      diagram_type: sequence
      scope_boundary: "Account-mode ownership"
      upstream_refs: "PRD.01.09.5cce; BDD.01.03.8180; BDD.01.03.f11f"
      downstream_refs: "SPEC account-mode adapter, hedging ownership, and deferred netting/exchange boundary contracts"
    tag: "@diagram: sequence-ownership"
    diagram:
      type: sequenceDiagram
      content: |
        sequenceDiagram
          participant Strategy
          participant Coord as CTradeCoordinator
          participant Pos as CPositionContext
          participant Adapter as IAccountModeAdapter
          participant Broker
          Strategy->>Coord: CloseAll/TrailSL/HasMyPosition
          Coord->>Pos: Request strategy-scoped operation
          Pos->>Adapter: Delegate by ACCOUNT_MARGIN_MODE
          alt hedging
            Adapter->>Broker: Operate on magic-filtered tickets
          else netting or exchange in v1
            Adapter-->>Pos: INIT_FAILED deferred account mode
            Pos-->>Strategy: Operator-facing deferred-mode diagnostic
          end
  integration_points:
    - system: "MT5 account mode"
      integration_type: "adapter selection"
      purpose: "Select hedging ownership mechanism at init or fail deferred netting/exchange modes before trading."
    - system: "MT5 broker order book"
      integration_type: "ticket/order evidence"
      purpose: "Carry magic-filtered hedging ownership evidence in v1."

## Section 7: Implementation Assessment
implementation_assessment:
  mvp_phases:
    - phase: "Hedging adapter"
      scope: "Ticket filtering, close, partial close, modify, and trailing behavior."
      risk: "Incorrect magic/symbol filtering touches another strategy."
    - phase: "Deferred account-mode gate"
      scope: "RETAIL_NETTING and EXCHANGE init failure, diagnostic logging, and no-side-effect evidence."
      risk: "Unsupported account mode reaches a live trade path."
  rollback_plan:
    strategy: "Block v1 sign-off until hedging evidence and deferred-mode init-failure evidence pass."
    trigger: "Any test showing netting/exchange can reach a trade path in v1 or hedging can touch another strategy's ticket."
    estimated_effort: "Medium"
  monitoring_baseline:
    - metric: "Cross-strategy ownership leak"
      target: "0"
      alert_threshold: "Any occurrence"

