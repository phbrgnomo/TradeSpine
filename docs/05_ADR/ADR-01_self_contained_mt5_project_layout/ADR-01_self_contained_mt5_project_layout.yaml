## Section 2: Context
context:
  problem_statement: "TradeSpine must be visible to MetaTrader 5 as Expert Advisors while keeping framework source, docs, tests, and vendored dependencies version-controlled under one project root."
  business_driver: "Strategy authors need clone-to-compile behavior without copying support files into terminal-wide include locations."
  key_constraints:
    - "EAs must live under MQL5/Experts to appear in MT5 Navigator."
    - "Framework includes must be quoted relative includes; symlinks and terminal-wide installation are not required."
    - "The project root is MQL5/Experts/Main/TradeSpine."
  technical_context: "PRD.md and architecture-diagram.html both define MQL5/Experts/Main/TradeSpine as the active root. BDD.01.03.aa68 validates simple sample and hedging port strategy packaging, and BDD.01.03.ef54 validates release governance evidence."

## Section 3: Decision
decision:
  chosen_solution:
    id: "ADR.01.03.42e3"
    title: "Use a self-contained MT5 Experts project root"
    description: "TradeSpine will live under MQL5/Experts/Main/TradeSpine. Strategies live under Experts/, framework modules under Include/, docs and tests remain under the same root, and source files use quoted relative includes."
  key_components:
    - name: "Experts/"
      role: "Holds user-visible strategy mq5 files."
    - name: "Include/"
      role: "Holds framework modules and vendored dependencies."
    - name: "docs/"
      role: "Holds aidoc-flow artifacts and release evidence."
  implementation_approach:
    mvp_scope: "Use the self-contained root and quoted relative includes for v1 simple samples and hedging strategy ports."
    next_cycle_scope: "No terminal-wide installer is planned unless future distribution needs justify it."

## Section 4: Alternatives Considered
alternatives:
  options:
    - id: "ADR.01.04.3f9c"
      name: "Self-contained project root"
      selected: true
      description: "Keep all TradeSpine project files under MQL5/Experts/Main/TradeSpine."
      pros: ["Clone-to-compile workflow", "Version-controlled docs and dependencies", "No terminal Include pollution"]
      cons: ["Relative include depth varies for nested strategy folders"]
      estimated_cost: "Low"
      fit: Best
    - id: "ADR.01.04.dfd2"
      name: "Terminal-wide Include installation"
      selected: false
      description: "Install framework files under MQL5/Include."
      pros: ["Shorter include statements"]
      cons: ["Breaks project self-containment", "Harder to reproduce on another terminal"]
      rejection_reason: "Conflicts with reproducibility and repository ownership."
      estimated_cost: "Medium"
      fit: Poor
    - id: "ADR.01.04.b4d5"
      name: "Symlink-based project layout"
      selected: false
      description: "Keep source elsewhere and symlink into terminal folders."
      pros: ["Could separate repo location from terminal tree"]
      cons: ["Adds platform-specific setup", "Can fail under Windows/Wine permissions"]
      rejection_reason: "Adds setup risk without improving v1 behavior."
      estimated_cost: "Medium"
      fit: Poor

## Section 5: Consequences
consequences:
  positive_outcomes:
    - id: "ADR.01.05.0ee2"
      outcome: "Reference strategies can compile from a clean checkout without global terminal setup."
  tradeoffs_and_risks:
    - id: "ADR.01.05.f3d1"
      tradeoff: "Strategy folders deeper than one level require longer relative include paths."
      impact: Medium
      mitigation: "Document include examples in AUTHORING and keep reference strategies shallow."
  cost_estimate:
    mvp_cost: "Low"
    ongoing_monthly: "None"
    notes: "Cost is documentation and compile-check discipline."

