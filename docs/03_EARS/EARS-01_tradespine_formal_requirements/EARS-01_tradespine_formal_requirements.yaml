## Glossary
glossary:
  terms:
    - term: EARS
      definition: "Easy Approach to Requirements Syntax."
    - term: BDD-Ready
      definition: "Score measuring EARS maturity for BDD transition."
    - term: Framework-mediated trade
      definition: "Trade action requested through TradeSpine helper and safety paths."
    - term: Runtime risk controls
      definition: "Per-EA daily loss, max open lots, max trades per day, and strategy-scoped panic stop controls."
    - term: Two-layer session model
      definition: "Entry gate requiring market trade-session availability and configured user trading-hours window."
    - term: Manual netting evidence pack
      definition: "Deferred v2+ live or demo evidence for concurrent same-symbol netting behavior that Strategy Tester cannot automate."
    - term: Trade evaluation record
      definition: "Structured intent and execution evidence used to evaluate strategy trading outcomes."
