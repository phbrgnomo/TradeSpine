## Section 2: Component Overview
component_overview:
  description: "The strategy authoring surface defines the base class, strategy-specific input contract, inherited indicator input contract, helper methods, exit-management hooks, event hook contract, common input include, and template requirements that keep strategy files focused on signal logic and behavior selection."
  architecture_decision: "@adr: ADR.09.03.84b9"
  diagram:
    tags: ["@diagram: c4-l3", "@diagram: dfd-l3"]
    mermaid: |
      flowchart LR
        StrategyFile["Strategy .mq5"] --> Base["CStrategyBase"]
        CommonInputs["CommonInputs.mqh"] --> StrategyFile
        StrategyInputs["Strategy-specific inputs"] --> StrategyFile
        IndicatorInputs["Indicator inputs"] --> StrategyFile
        Base --> Coordinator["CTradeCoordinator"]
        Base --> Indicators["Registered IIndicator list"]
        Base --> StateMachine["CPositionStateMachine"]
  language: "MQL5"
  dependencies:
    - name: "CTradeCoordinator"
      version: "v1"
      purpose: "Receives entry and close helper requests."
    - name: "CPositionStateMachine"
      version: "v1"
      purpose: "Owned once by CStrategyBase for lifecycle state."
    - name: "CommonInputs.mqh"
      version: "v1"
      purpose: "Provides universal operator inputs with grouped MT5 input labels."
    - name: "Indicator wrappers"
      version: "v1"
      purpose: "Expose indicator-specific inputs and readiness contracts used by the strategy."

## Section 3: Interfaces
interfaces:
  exports:
    - name: "CStrategyBase"
      type: "class"
      signature: "class CStrategyBase"
      description: "Base class that owns lifecycle staging, helper methods, and strategy hooks."
      errors:
        - "INIT_FAILED: required strategy initialization or signal timeframe contract is missing."
    - name: "OnStrategyInit"
      type: "virtual method"
      signature: "bool OnStrategyInit()"
      description: "Strategy hook used to install indicators and configure behavior policies before live trading."
      errors:
        - "false: strategy initialization is rejected before phase Live."
    - name: "OpenLong"
      type: "method"
      signature: "ulong OpenLong(string comment, double sl_price = 0, double tp_price = 0, string metadata = \"\")"
      description: "Requests a long entry through the coordinator pipeline."
      errors:
        - "0: lifecycle, readiness, validation, sizing, or guard rejection."
    - name: "OpenShort"
      type: "method"
      signature: "ulong OpenShort(string comment, double sl_price = 0, double tp_price = 0, string metadata = \"\")"
      description: "Requests a short entry through the coordinator pipeline."
      errors:
        - "0: lifecycle, readiness, validation, sizing, or guard rejection."
    - name: "CloseAll"
      type: "method"
      signature: "bool CloseAll(string reason)"
      description: "Requests closure of this strategy instance's owned exposure through the coordinator close branch."
      errors:
        - "false: ownership is unknown, close is rejected, or strategy is halted."
    - name: "OnManagePosition"
      type: "virtual method"
      signature: "void OnManagePosition()"
      description: "Strategy hook for signal exits, trailing-stop decisions, partial-management logic, and other post-entry exit management distinct from entry-time SL/TP and CloseAll."
      errors:
        - "None; invalid management actions are rejected by helper, guard, or position-context calls."
    - name: "RegisterIndicator"
      type: "method"
      signature: "bool RegisterIndicator(IIndicator *indicator)"
      description: "Registers an indicator for readiness-gate enforcement."
      errors:
        - "false: indicator reference is invalid or strategy init phase has passed."

## Section 4: Data Models
data_models:
  models:
    - name: "StrategyLifecyclePhase"
      type: "enum"
      fields:
        - name: "phase"
          type: "ENUM_STRATEGY_PHASE"
          required: true
          description: "Construct, framework-init, strategy-init, or live."
    - name: "StrategyIdentity"
      type: "struct"
      fields:
        - name: "account"
          type: "long"
          required: true
          description: "MT5 account login used in ownership keys."
        - name: "symbol"
          type: "string"
          required: true
          description: "Chart symbol bound to the strategy instance."
        - name: "magic"
          type: "ulong"
          required: true
          description: "Strategy magic number used for ownership and evidence."
    - name: "CommonInputSet"
      type: "include contract"
      fields:
        - name: "input_groups"
          type: "ordered group labels"
          required: true
          description: "Identity, lot caps, kill-switch, execution, session, sizing, symbol lifecycle, visualization, and logging groups."
    - name: "StrategyInputSet"
      type: "include contract"
      fields:
        - name: "strategy_inputs"
          type: "MT5 input declarations"
          required: true
          description: "Strategy-specific parameters owned by the strategy file, including signal thresholds, mode selectors, and any values exposed for optimization."
        - name: "indicator_inputs"
          type: "MT5 input declarations"
          required: false
          description: "Inputs required by indicators used by the strategy, such as moving-average period or ATR period, exposed in the strategy file so Strategy Tester optimization can select them."

## Section 5: Behavior
behavior:
  validation_rules:
    - rule: "Strategy files SHALL delegate entries and exits through documented TradeSpine helpers."
      source: "@ears: EARS.01.03.b784"
    - rule: "Each shipped v1 strategy artifact, including simple samples and hedging ports, SHALL compile as one strategy mq5 file plus shared TradeSpine includes."
      source: "@ears: EARS.01.03.4c3f"
    - rule: "Registered indicators that are not ready SHALL block entries."
      source: "@ears: EARS.01.03.4e80"
    - rule: "Strategy files SHALL declare their own strategy-specific inputs and the inputs of the indicators they use so both signal behavior and indicator parameters are optimizer-visible."
      source: "@prd: PRD.01.09.eaf3"
    - rule: "Exit management SHALL be strategy-owned: entry-time SL/TP, signal exits, trailing stops, partial closes, and CloseAll are distinct mechanisms that may coexist but MUST route through TradeSpine helpers or position-context operations."
      source: "@prd: PRD.01.09.5963"
  state_transitions:
    - from: "Strategy-init"
      to: "Live"
      trigger: "Framework modules, strategy init, symbol context, and required overrides are valid."
      source: "@bdd: BDD.01.03.aa68"
  error_handling:
    - condition: "A helper is called before Live."
      response: "Reject helper request and return failure without broker submission."
      source: "@bdd: BDD.01.03.9a8b"

## Section 6: Implementation Notes
implementation_notes:
  constraints:
    - "Strategy authors MUST NOT override or process OnTradeTransaction beyond the framework shim delegation."
    - "Sub-maintenance-cadence periodic trade logic belongs in OnTickEvent, not OnTimerEvent."
    - "Signal is framework-internal and MUST NOT become a strategy-authored API."
    - "CStrategyBase exposes lifecycle hooks and helper methods; the concrete strategy class owns signal decisions, strategy-specific inputs, indicator inputs, and post-entry exit-management decisions."
  patterns:
    - "Compose policy objects as strategy members and select them through GetSizer, GetStopPolicy, and trailing hooks."
    - "Keep CloseAll as an explicit strategy-exposure close request; keep signal exits and trailing stops in OnManagePosition or strategy hooks so they remain distinct from entry-time SL/TP."
    - "Use classes for lifecycle/stateful concerns and pure namespaces for stateless calculations per ADR-10."
  performance_considerations:
    - "Optimization-aware branches SHALL skip logging, drawing, and persistence work not required for accepted audit output."

