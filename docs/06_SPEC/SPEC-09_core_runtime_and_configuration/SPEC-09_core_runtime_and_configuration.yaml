## Section 2: Component Overview
component_overview:
  description: "The core runtime component provides shared configuration binding, optimization-mode awareness, safe numeric helpers, low-overhead profiling hooks, and bar/time detection primitives consumed by strategy, coordinator, execution, persistence, and testing modules."
  architecture_decision: "@adr: ADR.10.03.51ea"
  diagram:
    tags: ["@diagram: c4-l3", "@diagram: dfd-l3"]
    mermaid: |
      flowchart LR
        Inputs["CommonInputs"] --> Runtime["OptContext"]
        Runtime --> Coordinator["CTradeCoordinator"]
        Runtime --> Logging["Evidence/logging"]
        SafeMath["SafeMath"] --> Sizing["Sizing/stops"]
        Profiler["Profiler"] --> Release["Performance evidence"]
        Bars["CNewBarDetector"] --> Strategy["Strategy hooks"]
  language: "MQL5"
  dependencies:
    - name: "MQL5 terminal environment"
      version: "v1"
      purpose: "Provides tester, optimization, time, symbol, and account primitives."
    - name: "Persistence boundary"
      version: "v1"
      purpose: "Consumes optimization-aware logging and profiling decisions."
    - name: "Strategy authoring surface"
      version: "v1"
      purpose: "Consumes common inputs and new-bar/time helpers."

## Section 3: Interfaces
interfaces:
  exports:
    - name: "IClock"
      type: "interface"
      signature: "interface IClock"
      description: "Time source seam for broker time, local test time, timeout checks, and deterministic test advancement."
      errors:
        - "None; unavailable runtime time sources are surfaced by concrete implementations."
    - name: "ILogSink"
      type: "interface"
      signature: "interface ILogSink"
      description: "Diagnostics seam consumed by Profiler and future evidence sinks. Accepts ENUM_LOG_LEVEL for compile-time severity enforcement. Concrete CSV/journal sinks arrive with IPLAN-10+."
      errors:
        - "None; concrete implementations are responsible for surfacing write failures."
    - name: "ENUM_LOG_LEVEL"
      type: "enum"
      signature: "enum ENUM_LOG_LEVEL"
      description: "Log severity levels used by ILogSink: LOG_DEBUG, LOG_INFO, LOG_WARN, LOG_ERROR."
      errors:
        - "None."
    - name: "CommonInputs"
      type: "struct"
      signature: "struct CommonInputs"
      description: "Canonical framework input binding for magic, mode, session, sizing, risk, logging, and documentation-visible strategy settings."
      errors:
        - "INIT_FAILED when required input combinations are invalid or unsupported in v1."
    - name: "OptContext"
      type: "class"
      signature: "class OptContext"
      description: "Detects tester/optimization/live mode and exposes policy decisions for logging, diagnostics, profiling, and release evidence."
      errors:
        - "None; invalid environment reads default to conservative live-safe behavior."
    - name: "SafeMath"
      type: "namespace"
      signature: "namespace SafeMath"
      description: "Shared numeric normalization, finite-value, price-grid, lot-grid, and comparison helpers."
      errors:
        - "False/0.0 sentinel when value cannot be normalized safely."
    - name: "Profiler"
      type: "class"
      signature: "class Profiler"
      description: "Low-overhead timing and memory-budget evidence helper gated by runtime context."
      errors:
        - "Disabled in hot paths unless explicitly enabled for evidence."
    - name: "CNewBarDetector"
      type: "class"
      signature: "class CNewBarDetector"
      description: "Bar-transition detector used by strategies to avoid duplicate per-bar signal evaluation."
      errors:
        - "False when history/time context is unavailable."

## Section 4: Data Models
data_models:
  models:
    - name: "CommonInputs"
      type: "struct"
      fields:
        - name: "magic"
          type: "ulong"
          required: true
          description: "Strategy magic number; must be non-zero and remain unsigned end-to-end."
        - name: "day_trade_mode"
          type: "bool"
          required: true
          description: "true: close all positions before session end; false: swing/position (no forced intraday close)."
        - name: "close_mins_before"
          type: "int"
          required: true
          description: "[day_trade_mode] Minutes before session end to close. Must be >= 0."
        - name: "entry_window_start"
          type: "datetime"
          required: true
          description: "[day_trade_mode] Entries allowed from this broker time. Date ignored; HH:MM used."
        - name: "entry_window_end"
          type: "datetime"
          required: true
          description: "[day_trade_mode] No new entries after this broker time. Must be after start."
        - name: "sizing_mode"
          type: "ENUM_SIZING_MODE"
          required: true
          description: "v1: FIXED_LOT, RISK_PCT_EQUITY. v2 placeholders rejected visibly."
    - name: "RuntimeMode"
      type: "struct"
      fields:
        - name: "is_tester"
          type: "bool"
          required: true
          description: "Whether execution is inside Strategy Tester."
        - name: "is_optimization"
          type: "bool"
          required: true
          description: "Whether execution is an optimization pass."
        - name: "diagnostics_enabled"
          type: "bool"
          required: true
          description: "Whether detailed diagnostics are allowed for the current runtime mode."
    - name: "ProfileSample"
      type: "struct"
      fields:
        - name: "scope"
          type: "string"
          required: true
          description: "Measured component or operation."
        - name: "elapsed_us"
          type: "long"
          required: true
          description: "Measured elapsed time in microseconds."
        - name: "enabled"
          type: "bool"
          required: true
          description: "Whether this sample was collected under the active profiling policy."
    - name: "BenchmarkBaseline"
      type: "struct"
      fields:
        - name: "scenario"
          type: "string"
          required: true
          description: "Benchmark harness scenario name."
        - name: "baseline_memory"
          type: "long"
          required: true
          description: "Memory reading captured before component under test is attached."
        - name: "component_memory_delta"
          type: "long"
          required: true
          description: "Measured memory delta used for per-EA budget evidence."
        - name: "timing_source"
          type: "string"
          required: true
          description: "Runtime timing source used by the benchmark harness."

## Section 5: Behavior
behavior:
  validation_rules:
    - rule: "CommonInputs SHALL expose the documented v1 strategy authoring settings and reject unsupported v2 placeholder selections visibly."
      source: "@ears: EARS.01.03.0c0a"
    - rule: "Optimization-mode logging and profiling SHALL avoid high-I/O work unconditionally; no audit override is provided during optimization."
      source: "@ears: EARS.01.03.c5b7"
    - rule: "SafeMath SHALL centralize finite-number, price-grid, lot-grid, and tolerance checks used by sizing, stops, and execution guards."
      source: "@ears: EARS.01.03.ec72"
    - rule: "Performance evidence SHALL include tester overhead, per-EA memory, and idle-tick overhead budgets."
      source: "@ears: EARS.01.03.8044"
    - rule: "Memory-budget evidence SHALL use a documented baseline-and-delta harness rather than claiming exact per-object memory attribution."
      source: "@ears: EARS.01.03.8044"
    - id: "VR-ACCT-01"
      rule: |
        THE framework SHALL fail initialization when AccountInfoInteger(ACCOUNT_MARGIN_MODE)
        is not ACCOUNT_MARGIN_MODE_RETAIL_HEDGING. Account mode is a broker account property,
        not a user input; it is read at OnInit() and checked before any CommonInputs validation.
      source: "@ears: EARS.01.03.5d1b"
  state_transitions:
    - from: "RuntimeUnbound"
      to: "RuntimeReady"
      trigger: "CommonInputs and OptContext initialize successfully."
      source: "@bdd: BDD.01.03.aa68"
  error_handling:
    - condition: "Unsupported v2 placeholder input is selected in v1."
      response: "Fail initialization or visibly reject the feature without silently mapping it to a v1 behavior."
      source: "@bdd: BDD.01.03.cb03"
    - condition: "Profiler is invoked on a disabled hot path."
      response: "Return without I/O or persistent writes."
      source: "@bdd: BDD.01.03.b37d"

## Section 6: Implementation Notes
implementation_notes:
  constraints:
    - "Core runtime utilities MUST NOT call broker execution APIs."
    - "Profiler and OptContext MUST be dependency-injectable for Tier-1 tests."
    - "CommonInputs is the canonical source for framework-wide input names; strategy templates document only their strategy-specific additions."
    - "Memory evidence MUST record the benchmark baseline, component delta, terminal/build context, and scenario name."
  patterns:
    - "Use pure functions in SafeMath where no terminal state is needed."
    - "Use lightweight runtime-mode predicates before diagnostic or evidence writes."
    - "Use CNewBarDetector inside strategy hook code, not as a framework-level hidden signal scheduler."
    - "Use documented MQL runtime timing and memory introspection APIs through Profiler rather than direct calls scattered across components."
  performance_considerations:
    - "Runtime helpers must respect @threshold: PRD.01.perf.idle_tick, @threshold: PRD.01.perf.memory_per_ea, and @threshold: PRD.01.perf.tester_overhead."

