## Section 2: Component Overview
component_overview:
  description: "Testing support provides deterministic doubles for clock, broker port, state store, symbol/account context, log sinks, and scenario harnesses so Tier-1 and Tier-1.5 tests can validate TradeSpine behavior before Strategy Tester or live/demo release gates."
  architecture_decision: "@adr: ADR.10.03.51ea"
  diagram:
    tags: ["@diagram: c4-l3", "@diagram: dfd-l3"]
    mermaid: |
      flowchart LR
        Tests["MQL5 test scripts"] --> Harness["ScenarioHarness"]
        Harness --> Clock["FakeClock"]
        Harness --> Broker["FakeTradePort"]
        Harness --> Store["FakeStateStore"]
        Harness --> Symbol["FakeSymbolContext"]
        Harness --> Logs["FakeLogSink"]
        Harness --> Components["SPEC components"]
  language: "MQL5"
  dependencies:
    - name: "Core runtime shared interfaces"
      version: "v1"
      purpose: "IPLAN-09 publishes stable interfaces for clocks, trade ports, stores, runtime context, and diagnostics before fakes implement them."
    - name: "Release governance"
      version: "v1"
      purpose: "Consumes test reports and manual evidence packs."

## Section 3: Interfaces
interfaces:
  exports:
    - name: "FakeClock"
      type: "class"
      signature: "class FakeClock : public IClock"
      description: "Deterministic time source for session, timeout, daily reset, and evidence ordering tests."
      errors:
        - "None."
    - name: "FakeTradePort"
      type: "class"
      signature: "class FakeTradePort : public ITradePort"
      description: "Deterministic broker boundary double returning configured GuardResult sequences."
      errors:
        - "Configured failures, pending outcomes, retry retcodes, or ambiguity."
    - name: "FakeStateStore"
      type: "class"
      signature: "class FakeStateStore : public IStateStore"
      description: "In-memory persistence double for ledger, duplicate marker, HALT, and evidence tests."
      errors:
        - "Configured write/read failures for recovery tests."
    - name: "FakeSymbolContext"
      type: "class"
      signature: "class FakeSymbolContext"
      description: "Deterministic symbol metadata and market data provider for sizing, stops, spread, and fill-mode tests."
      errors:
        - "Configured missing metadata, invalid grids, or unavailable ticks."
    - name: "ScenarioHarness"
      type: "class"
      signature: "class ScenarioHarness"
      description: "Reusable assembly for component-under-test, fakes, stimulus, and evidence assertions."
      errors:
        - "Test assertion failure."

## Section 4: Data Models
data_models:
  models:
    - name: "BrokerEventScript"
      type: "struct"
      fields:
        - name: "step"
          type: "int"
          required: true
          description: "Event sequence index."
        - name: "guard_result"
          type: "GuardResult"
          required: true
          description: "Configured execution outcome for the step."
        - name: "transaction_event"
          type: "TradeTransactionEvent"
          required: false
          description: "Optional synthetic trade transaction for router/state tests."
    - name: "EvidenceAssertion"
      type: "struct"
      fields:
        - name: "expected_kind"
          type: "ENUM_EVIDENCE_KIND"
          required: true
          description: "Intent, execution, diagnostic, state, or release evidence kind."
        - name: "expected_trace"
          type: "string"
          required: true
          description: "Expected requirement/spec trace tag in the emitted evidence."
        - name: "required"
          type: "bool"
          required: true
          description: "Whether absence is a test failure."
    - name: "DeferredAccountModeEvidencePack"
      type: "struct"
      fields:
        - name: "account_mode"
          type: "ENUM_ACCOUNT_MODE"
          required: true
          description: "Deferred account mode covered by init-failure evidence."
        - name: "scenario"
          type: "string"
          required: true
          description: "Deferred-mode validation scenario name."
        - name: "artifacts"
          type: "string"
          required: true
          description: "Evidence file paths or operator notes proving init failure and no trade-path side effects."

## Section 5: Behavior
behavior:
  validation_rules:
    - rule: "Tier-1 tests SHALL use deterministic fakes for broker, clock, store, symbol, account, logging, and runtime seams."
      source: "@bdd: BDD.01.03.aa68"
    - rule: "Tier-1.5 tests SHALL cover hedging account ownership, deferred netting/exchange init failure, no side effects, and manual non-interference scenarios."
      source: "@bdd: BDD.01.03.f415"
    - rule: "Release governance SHALL distinguish automated Strategy Tester evidence from deferred account-mode evidence required for v1 netting/exchange exclusion."
      source: "@ears: EARS.01.03.d7e9"
    - rule: "Test harnesses SHALL verify paired strategy diagnostics and trade execution logs remain separate evidence streams."
      source: "@ears: EARS.01.03.a71c"
  state_transitions:
    - from: "TestUnassembled"
      to: "TestReady"
      trigger: "ScenarioHarness receives required component and fake dependencies."
      source: "@bdd: BDD.01.03.aa68"
  error_handling:
    - condition: "Fake broker script is exhausted before component behavior completes."
      response: "Fail the test with missing broker outcome evidence."
      source: "@bdd: BDD.01.03.e16a"
    - condition: "Manual evidence pack is required but absent."
      response: "Mark release gate blocked rather than substituting automated tester evidence."
      source: "@bdd: BDD.01.03.f415"

## Section 6: Implementation Notes
implementation_notes:
  constraints:
    - "Test support modules MUST remain outside production execution paths."
    - "Fakes MUST implement the same interfaces consumed by production components, and those interfaces MUST be published by IPLAN-09 before test support implementation starts."
    - "Manual evidence pack contracts MUST remain visible to release governance and must not be represented as Strategy Tester automation."
  patterns:
    - "Use scenario scripts to drive fake broker outcomes and trade transaction callbacks."
    - "Use in-memory stores to assert duplicate marker, ledger, HALT, and evidence writes."
    - "Keep component construction explicit so TDD can map each BDD scenario to a harness."
  performance_considerations:
    - "Performance tests must collect evidence for @threshold: PRD.01.perf.tester_overhead, @threshold: PRD.01.perf.memory_per_ea, and @threshold: PRD.01.perf.idle_tick."

