change_description:
  what: |
    Three structural corrections to the CommonInputs struct, plus one explicit
    magic-number type clarification (IPLAN-09 delivery review):

    1. ACCOUNT_MODE_POLICY removed from user inputs.
       Account mode is not a user configuration — it is a broker account property.
       The framework reads AccountInfoInteger(ACCOUNT_MARGIN_MODE) at OnInit and
       fails initialization when the account is not ACCOUNT_MARGIN_MODE_RETAIL_HEDGING.
       ENUM_ACCOUNT_MODE_POLICY and the account_mode_policy field are removed.

    2. SESSION_MODE replaced by day_trade_mode (bool) + session fields.
       The original ENUM_SESSION_MODE (SESSION_MARKET_DAYTRADE / SESSION_USER_DEFINED)
       was replaced with three explicit fields:
         - day_trade_mode: bool (true = close all positions before session end)
         - close_mins_before: int (minutes before close to exit; only when day_trade_mode)
         - entry_window_start: datetime (start of entry-allowed window; HH:MM component used)
         - entry_window_end: datetime (end of entry-allowed window; HH:MM component used)

    3. magic remains ulong.
       The CommonInputs magic field remains unsigned end-to-end to match the
       MQL5 trade API and the implemented code. Validation rejects zero; signed
       broker-query comparisons are handled at the comparison boundary when needed.

    4. audit_in_optimization removed entirely.
       During optimizer runs, ALL non-core work (logging, diagnostics, profiling)
       is silenced unconditionally. There is no operator override because allowing
       evidence writes during optimization degrades optimizer throughput. OptContext
       policy methods now return false for optimization with no conditional.
  why: |
    These are design corrections identified during IPLAN-09 delivery review before
    downstream strategy authors or other IPLANs (e.g. IPLAN-07 sizing module) consume
    the CommonInputs struct. Correcting now prevents a C3 cascade across all future code.
  trigger: |
    Developer design review on 2026-06-04 during IPLAN-09 implementation sign-off.

