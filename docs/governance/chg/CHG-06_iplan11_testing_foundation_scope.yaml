id: CHG-06
title: "IPLAN-11 Testing Foundation Scope Repair"

metadata:
  document_type: "chg-document"
  purpose: governance
  last_updated: "2026-06-05"
  change_level:
    value: C2
  change_source:
    value: design

change_control:
  chg_id: "CHG-06"
  status: In Review
  change_level: C2
  change_source: design
  entry_gate: GATE-06
  semver_impact: null
  author: "Codex"
  date_proposed: "2026-06-05T00:00:00-03:00"
  date_approved: null
  date_implemented: "2026-06-05T00:00:00-03:00"
  supersedes: ["CHG-05"]

change_description:
  what: |
    Supersede the CHG-05 resequencing decision. IPLAN-11 remains the Tier 2
    testing foundation after IPLAN-09, but its scope is narrowed to shared test
    primitives that compile against IPLAN-09 contracts: assertion helpers,
    FakeClock, capturing log/runtime fakes, minimal ScenarioHarness hooks,
    release-evidence separation helpers, and the aggregate test runner.

    Owner-specific fakes move to their owning future implementation plans:
      - FakeTradePort, GuardResult, and TradeIntent test doubles move to IPLAN-03.
      - Position/account-context test doubles move to IPLAN-04.
      - State-store and persistence/evidence fakes move to IPLAN-05.
  why: |
    CHG-05 correctly identified that the broad IPLAN-11 draft consumed
    interfaces owned by IPLAN-03, IPLAN-04, and IPLAN-05, but its remedy inverted
    the intended implementation sequence by blocking the shared test foundation
    on future component plans. Narrowing IPLAN-11 preserves the intended order:
    IPLAN-09 completes core runtime contracts, then IPLAN-11 delivers shared test
    support, and later owner plans extend that support with their own fakes.
  trigger: |
    Planning review on 2026-06-05 found that IPLAN-11 was intended to follow
    completed IPLAN-09, but CHG-05 changed it to depend on future IPLAN-03,
    IPLAN-04, and IPLAN-05.

impact_assessment:
  affected_layers:
    - layer: SPEC
      artifacts: ["SPEC-11"]
      impact: |
        Narrow the testing-support component to shared primitives and document
        broker, position, and store fakes as downstream owner-plan extensions.
      cascade_direction: downstream
    - layer: TDD
      artifacts: ["TDD-11"]
      impact: |
        Remap tests away from unpublished owner interfaces. Keep BDD traceability
        while limiting executable TDD-11 files to IPLAN-09-compatible support.
      cascade_direction: downstream
    - layer: IPLAN
      artifacts: ["IPLAN-00", "IPLAN-11"]
      impact: |
        Restore IPLAN-11 depends_on to IPLAN-09 only, set Tier 2 back to
        NOT_STARTED, and update IPLAN-11 manifest/contracts/session handoff so it
        no longer requires IPLAN-03/04/05 before starting.
      cascade_direction: downstream
  risk_level: Medium
  risk_justification: |
    Documentation-only scope repair before IPLAN-11 implementation starts. The
    risk is traceability drift: SPEC/TDD/IPLAN must agree that owner-specific
    fakes are deferred to their owner plans rather than deleted from the product
    scope. Validation checks parse YAML, inspect dependency graph ordering, and
    verify no IPLAN-11 manifest entry requires ITradePort, IPositionView, or
    IStateStore.
  rollback_plan: |
    Re-apply CHG-05 by restoring IPLAN-11 depends_on to include IPLAN-03,
    IPLAN-04, and IPLAN-05, setting Tier 2 to BLOCKED, and restoring the broad
    manifest/contracts that directly reference owner interfaces.

implementation:
  steps:
