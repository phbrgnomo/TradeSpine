    validation logic, and all operator-visible diagnostic messages remain identical
    (diagnostics now use the clearer new names). All three IPLAN-09 test scripts
    have been updated and re-verified in MT5. No runtime semantics change.
  rollback_plan: |
    Revert enum names in CommonInputs.mqh and re-apply the old names to any updated
    doc text. Because this is a pure naming change with no behavioral effect, rollback
    has zero functional risk — only a terminology regression. A global replace_all in
    each updated file restores the prior state in under five minutes.

