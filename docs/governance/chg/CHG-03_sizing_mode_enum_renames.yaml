change_description:
  what: |
    Rename two ENUM_SIZING_MODE enumerators in CommonInputs.mqh:
    - SIZING_RISK_PERCENT → SIZING_RISK_PCT_EQUITY
      Clarifies this is futures risk-based sizing: (SL × lots = % ACCOUNT_EQUITY).
    - SIZING_PCT_EQUITY → SIZING_VALUE_PCT_EQUITY
      Clarifies this v2 placeholder is for stocks/non-leveraged positions:
      (price × lots = % ACCOUNT_EQUITY), distinct from the SL-driven futures mode.
    Propagate the new names through all SDD docs that reference them by identifier.
  why: |
    The original names were ambiguous:
    - SIZING_RISK_PERCENT omitted that the denominator is ACCOUNT_EQUITY.
    - SIZING_PCT_EQUITY was misleading because SIZING_RISK_PCT_EQUITY (the v1 live
      mode) is also equity-based. The distinction is the numerator: SL-risk (futures)
      vs notional position value (stocks). The new names encode both the basis (RISK vs
      VALUE) and the denominator (PCT_EQUITY), making the formula unambiguous for future
      strategy authors without reading inline comments.
  trigger: |
    Discovered during IPLAN-09 (core runtime and configuration) delivery on 2026-06-04.
    The user identified that the names would confuse downstream strategy authors about
    which equity-percent mode applied to leveraged futures vs unleveraged stocks.
    Correcting before IPLAN-07 (sizing module) is implemented avoids a subsequent
    C3-level rename across all downstream strategy consumers.

