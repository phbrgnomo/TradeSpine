change_description:
  what: |
    Expand the v1 shipped strategy set from two simple reference strategies to
    four strategy artifacts: Donchian breakout and Moving-Average crossing remain
    simple implementation samples, while `1minscalpv3_hedging.mq5` and
    `BullishBearish Engulfing all v7 hedging.mq5` become additional hedging
    ports.
  why: |
    The simple samples are still needed for low-friction authoring examples, but
    v1 also needs evidence that real existing hedging strategy code can be ported
    into the TradeSpine framework surface.
  trigger: |
    Product owner request to include two existing hedging EAs as additional v1
    ports without replacing the simple sample strategies.

