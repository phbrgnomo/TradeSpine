# =============================================================================
# Section 2: Change Description
# =============================================================================

change_description:
  what: |
    Rename two class identifiers in SPEC-09, TDD-09, and all Code artifacts to
    follow the MQL5 C-prefix naming convention that is standard across the MT5
    standard library and the rest of the TradeSpine codebase (CNewBarDetector
    already used it; OptContext and Profiler did not).

    Renames:
      OptContext  → COptContext   (Include/Core/OptContext.mqh, SPEC-09, TDD-09)
      Profiler    → CProfiler     (Include/Core/Profiler.mqh,  SPEC-09, TDD-09)

    All associated test files and the global g_profiler pointer type are updated
    accordingly. No interfaces, contracts, method signatures, or behavioral
    requirements change.

  why: |
    The MT5 standard library convention prefixes all class names with "C".
    CNewBarDetector already followed this convention while OptContext and Profiler
    did not, creating an inconsistency within the same SPEC-09 component set.
    Aligning the identifiers now, before any downstream strategy EA includes these
    headers, avoids a more disruptive rename later when consumers multiply.

  trigger: |
    Code review of IPLAN-09 deliverables (2026-06-07) identified the naming
    inconsistency. User instruction confirmed adoption of the standard convention
    and requested SDD documentation be updated to match.

