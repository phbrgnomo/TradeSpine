change_description:
  what: |
    Change TradeSpine v1 account-mode scope to hedging-first execution:
    RETAIL_HEDGING is the default and only executable v1 mode, while
    RETAIL_NETTING and EXCHANGE remain selectable/detectable but fail
    initialization with an operator-facing deferred-mode diagnostic.
  why: |
    Netting/exchange ownership requires virtual gross-position ledgers,
    pending-exit/OCO rules, execution mutex behavior, and manual concurrent
    evidence that are too risky for the v1 implementation path. Deferring them
    prevents incomplete netting logic from reaching live trading while preserving
    the adapter boundary for v2+.
  trigger: |
    Product owner architecture change request before moving from SPEC into the
    v1 implementation roadmap.

