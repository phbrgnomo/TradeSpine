  supersedes: []

change_description:
  what: |
    Move concrete test doubles out of Include/Core so the core runtime exposes
    only production-facing contracts and data models. FakeClock is relocated to
    Scripts/Tests/Support/FakeClock.mqh because downstream testing-support
    artifacts already identify it as shared test support. CapturingLogSink is
    localized inside Scripts/Tests/Test_OptContextProfiler.mq5 because it is
    currently used by only that test file.

    Register the boundary rule:
      - Local test doubles first.
      - Extract to Scripts/Tests/Support only after the same fake is needed in
        two or more test files.
      - Never keep concrete fakes in Include/Core.
  why: |
    Include/Core/Interfaces.mqh mixed production contracts (IClock, ILogSink,
    RuntimeMode, ProfileSample, BenchmarkBaseline) with concrete test doubles.
    That made the Core boundary less clear and conflicted with the IPLAN-11
    testing-support layout, which places shared fakes under Scripts/Tests/Support.
  trigger: |
    Architecture review on 2026-06-06 questioned whether test seams should live
    in Core. Documentation history showed that IClock belongs to SPEC-09 Core,
    while FakeClock belongs to SPEC-11/IPLAN-11 test support.

impact_assessment:
  affected_layers:
    - layer: Code
      artifacts:
        - "Include/Core/Interfaces.mqh"
        - "Scripts/Tests/Support/FakeClock.mqh"
        - "Scripts/Tests/Test_OptContextProfiler.mq5"
      impact: |
        Remove concrete fakes from Core, add shared FakeClock under test support,
        and keep CapturingLogSink local to its only current test consumer.
      cascade_direction: bubble-up
    - layer: IPLAN
      artifacts: ["IPLAN-09", "IPLAN-11"]
      impact: |
        Correct IPLAN-09 implementation handoff text so it no longer says
        Interfaces.mqh owns FakeClock or CapturingLogSink. Verify IPLAN-11
        remains aligned with Scripts/Tests/Support/FakeClock.mqh.
      cascade_direction: bubble-up
    - layer: SPEC
      artifacts: ["SPEC-09", "SPEC-11"]
      impact: |
        Verify SPEC-09 continues to own IClock/ILogSink contracts and SPEC-11
        continues to own concrete test-support fakes. No SPEC behavior change is
        required.
      cascade_direction: bubble-up
    - layer: SupportingDocs
      artifacts: ["docs/articles/Article2-iplan-09.md"]
      impact: |
        Update publication prose so it describes the concrete FakeClock as test
        support outside production Core rather than a Core-owned test double.
      cascade_direction: bubble-up
  risk_level: Low
  risk_justification: |
    Code behavior should remain unchanged. The risk is include-path or stale-doc
    drift after moving a concrete fake out of Core. Static searches and MQL5 test
    compilation cover the changed dependency boundary.
  rollback_plan: |
    Restore FakeClock and CapturingLogSink to Include/Core/Interfaces.mqh, remove
    Scripts/Tests/Support/FakeClock.mqh, remove the local CapturingLogSink class
    from Test_OptContextProfiler.mq5, and restore the previous IPLAN-09 handoff
    wording.

implementation:
  steps:
    - step: 1
      action: "Remove FakeClock and CapturingLogSink from Include/Core/Interfaces.mqh and update header wording."
      artifact: "Include/Core/Interfaces.mqh"
