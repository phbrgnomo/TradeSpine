  document_type: "chg-document"
  purpose: governance
  last_updated: "2026-06-06"
  change_level:
    value: C2
  change_source:
    value: feedback

change_control:
  chg_id: "CHG-07"
  status: Approved
  change_level: C2
  change_source: feedback
  entry_gate: GATE-CODE
  semver_impact: null
  author: "Codex"
  date_proposed: "2026-06-06T00:00:00-03:00"
  date_approved: "2026-06-07T00:00:00-03:00"
