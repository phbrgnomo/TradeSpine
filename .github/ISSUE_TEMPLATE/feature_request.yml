name: Feature request
description: Propose a feature or enhancement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Which problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impacted layers
      description: BRD, PRD, EARS, BDD, ADR, SPEC, TDD, IPLAN, code.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
